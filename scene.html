<style>

<script>
/* 场景选择:?w=N → scenes/sceneNN.js */
(function(){
  const w=new URLSearchParams(location.search).get('w')||'1';
  const s=document.createElement('script');
  s.src='scenes/scene'+String(w).padStart(2,'0')+'.js?v=1';
  s.onerror=()=>{document.getElementById('load').textContent='场景 '+w+' 不存在';};
  document.write('<script src="'+s.src+'"><\/script>');
})();
</script>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {DRACOLoader} from 'three/addons/loaders/DRACOLoader.js';
const DRACO=new DRACOLoader().setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/libs/draco/gltf/');
const newGLTF=()=>new GLTFLoader().setDRACOLoader(DRACO);
const SC=window.SCENE_CONFIG;
const T=x=>window.__t2?window.__t2(x):x;
document.getElementById('sceneTtl').textContent=T(SC.name)+' · '+SC.rank;

/* ---------- 课程序列(重排只在这里:按 SC.chapters 取引擎 CH 现成关卡) ---------- */
function seqLevels(){
  const out=[];
  SC.chapters.forEach(id=>{
    const ch=(typeof CH!=='undefined')&&CH.find(c=>c.id===id);
    if(ch)ch.levels.forEach(l=>out.push(l));
  });
  return out;
}
function nextLevel(){const s=seqLevels();return s.find(l=>!prog[l.key])||null;}
function doneCount(){const s=seqLevels();return s.filter(l=>prog[l.key]).length;}

/* ---------- 灯笼进度(安静奖励) ---------- */
let lastLit=-1;
function renderLanterns(celebrate){
  const s=seqLevels(),n=doneCount();
  const el=document.getElementById('lanterns');
  el.innerHTML=s.map((l,i)=>'<span class="lt'+(i<n?' on':'')+(celebrate&&i===n-1?' just':'')+'"></span>').join('');
  lastLit=n;
}

/* ---------- 2.5D 布景(slice 底座,参数来自 SC.ambience) ---------- */
const A=SC.ambience;
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.16;
app.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0xE8EEF8);
scene.fog=new THREE.Fog(A.fog,22,56);
const cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.1,400);
scene.add(new THREE.HemisphereLight(0xFFFFFF,0xEFF2FA,1.3));
const sun=new THREE.DirectionalLight(A.sun,1.2);sun.position.set(26,50,30);
sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.left=-40;sun.shadow.camera.right=40;sun.shadow.camera.top=40;sun.shadow.camera.bottom=-40;
scene.add(sun);
const backdrop=new THREE.Mesh(new THREE.PlaneGeometry(190,107),
  new THREE.MeshBasicMaterial({map:new THREE.TextureLoader().load(SC.bg+SC.bgV,t=>{t.colorSpace=THREE.SRGBColorSpace;}),fog:false}));
backdrop.position.set(0,24,-62);scene.add(backdrop);
(function(){ /* 接缝雾带 */
  const c=document.createElement('canvas');c.width=4;c.height=128;
  const x=c.getContext('2d');const g=x.createLinearGradient(0,0,0,128);
  g.addColorStop(0,'rgba(246,249,253,0)');g.addColorStop(.35,'rgba(246,249,253,1)');
  g.addColorStop(.75,'rgba(246,249,253,1)');g.addColorStop(1,'rgba(246,249,253,0)');
  x.fillStyle=g;x.fillRect(0,0,4,128);
  const mist=new THREE.Mesh(new THREE.PlaneGeometry(210,32),
    new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,fog:false}));
  mist.position.set(0,2.5,-57);scene.add(mist);
})();
for(let i=0;i<11;i++){ /* 地平线雪丘 */
  const x=-60+i*12+((i*7)%5)-2,z=-40-((i*3)%3)*4,r=6+((i*5)%4)*1.6;
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),
    new THREE.MeshStandardMaterial({color:0xFCFDFF,roughness:.98}));
  m.scale.y=.42;m.position.set(x,-.3,z);scene.add(m);
}
const ground=new THREE.Mesh(new THREE.CircleGeometry(140,48),
  new THREE.MeshStandardMaterial({color:A.ground,roughness:.97}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
function prop(url,x,z,h,ry){
  newGLTF().load('assets/models/'+url,g=>{
    const sc=g.scene;sc.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
    const b=new THREE.Box3().setFromObject(sc);const hh=b.max.y-b.min.y,cx=(b.min.x+b.max.x)/2,cz=(b.min.z+b.max.z)/2;
    const k=h/hh;sc.scale.setScalar(k);sc.position.set(x-cx*k,-b.min.y*k,z-cz*k);sc.rotation.y=ry||0;
    scene.add(sc);
  },undefined,()=>{});
}
(A.props||[]).forEach(p=>prop(...p));
(A.warmLights||[]).forEach(([x,z])=>{const pl=new THREE.PointLight(0xFFC98A,5.5,11,1.8);pl.position.set(x,2.1,z);scene.add(pl);});
/* 飘雪 */
let snowPts=null,spd=[];
if(A.snow){
  const g=new THREE.BufferGeometry();const n=130,pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){pos[i*3]=(Math.random()-.5)*90;pos[i*3+1]=Math.random()*34;pos[i*3+2]=(Math.random()-.5)*70-10;spd.push(.6+Math.random()*1.1);}
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  snowPts=new THREE.Points(g,new THREE.PointsMaterial({color:0xffffff,size:.35,transparent:true,opacity:.85}));
  scene.add(snowPts);
}
/* 课程入口:金光圈(呼吸) */
const ering=new THREE.Mesh(new THREE.TorusGeometry(SC.entrance.r,.16,12,40),
  new THREE.MeshStandardMaterial({color:0xF2C76E,roughness:.55,emissive:0xC9952E,emissiveIntensity:.35}));
ering.rotation.x=-Math.PI/2;ering.position.set(SC.entrance.x,.1,SC.entrance.z);scene.add(ering);
const eglow=new THREE.Mesh(new THREE.CircleGeometry(SC.entrance.r*.82,32),
  new THREE.MeshBasicMaterial({color:0xFFF3D6,transparent:true,opacity:.35,depthWrite:false}));
eglow.rotation.x=-Math.PI/2;eglow.position.set(SC.entrance.x,.12,SC.entrance.z);scene.add(eglow);

/* ---------- 兔子 + 蹦跶 + 踩雪音(slice 底座) ---------- */
const player=new THREE.Group();scene.add(player);
player.position.set(0,0,8);
let heroYaw=Math.PI,mixer=null;
newGLTF().load('assets/models/anim/bunny_idle.glb',g=>{
  const sc=g.scene;sc.traverse(o=>{if(o.isMesh)o.castShadow=true;});
  const b=new THREE.Box3().setFromObject(sc);const hh=b.max.y-b.min.y,cx=(b.min.x+b.max.x)/2,cz=(b.min.z+b.max.z)/2;
  const s=2.0/hh;sc.scale.setScalar(s);sc.position.set(-cx*s,-b.min.y*s,-cz*s);
  player.add(sc);
  mixer=new THREE.AnimationMixer(sc);
  if(g.animations[0])mixer.clipAction(g.animations[0]).play();
  document.getElementById('load').style.opacity=0;
  setTimeout(()=>document.getElementById('load').style.display='none',600);
},undefined,()=>{document.getElementById('load').textContent='模型加载失败,请刷新';});
let actx=null,noise=null;
function ensureAudio(){
  if(actx)return;
  try{actx=new (window.AudioContext||window.webkitAudioContext)();
    const b=actx.createBuffer(1,actx.sampleRate*.5,actx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;noise=b;}catch(e){}
}
function snowCrunch(){
  if(!actx||!noise)return;const t=actx.currentTime;
  for(let i=0;i<3;i++){
    const src=actx.createBufferSource();src.buffer=noise;src.playbackRate.value=1.2+Math.random()*.6;
    const hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=2400+Math.random()*900;
    const g=actx.createGain();const t0=t+i*.013+Math.random()*.007;
    g.gain.setValueAtTime(.0001,t0);g.gain.linearRampToValueAtTime(.10+Math.random()*.05,t0+.006);
    g.gain.exponentialRampToValueAtTime(.001,t0+.09+Math.random()*.04);
    src.connect(hp);hp.connect(g);g.connect(actx.destination);src.start(t0);src.stop(t0+.16);
  }
  const th=actx.createBufferSource();th.buffer=noise;th.playbackRate.value=.5;
  const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=340;
  const g2=actx.createGain();g2.gain.setValueAtTime(.0001,t);
  g2.gain.linearRampToValueAtTime(.16,t+.01);g2.gain.exponentialRampToValueAtTime(.001,t+.12);
  th.connect(lp);lp.connect(g2);g2.connect(actx.destination);th.start(t);th.stop(t+.15);
}
const keys={};
addEventListener('keydown',e=>keys[e.key]=true);
addEventListener('keyup',e=>keys[e.key]=false);
let touching=false,touchTurn=0,lastX=0,autoT=performance.now()+800;
addEventListener('pointerdown',e=>{if(e.target.closest&&e.target.closest('#qzApp'))return;ensureAudio();autoT=0;touching=true;lastX=e.clientX;});
addEventListener('pointermove',e=>{if(touching){touchTurn+=(lastX-e.clientX)*.010;lastX=e.clientX;}});
function endT(){touching=false;touchTurn=0;}
addEventListener('pointerup',endT);addEventListener('pointercancel',endT);
const HOP_LEN=2.0,HOP_DUR=.40,HOP_H=.62,REST=.07;
const hop={active:false,t:0,fx:0,fz:0,tx:0,tz:0,rest:0};

/* ---------- 课程浮层接线(第一版引擎,零改造) ---------- */
let overlayOpen=false,entranceCool=0;
window.QZ_HOST={
  show(){overlayOpen=true;document.getElementById('qzApp').classList.add('on');},
  hide(){
    overlayOpen=false;document.getElementById('qzApp').classList.remove('on');
    try{prog=JSON.parse(localStorage.getItem('qz2_prog'))||prog;}catch(e){}
    const n=doneCount();
    renderLanterns(n>lastLit);            // 新灯笼 pop 动画 = 安静奖励
    entranceCool=performance.now()+2200;  // 防秒重进
    /* 兔子退到圈外一点 */
    const dx=player.position.x-SC.entrance.x,dz=player.position.z-SC.entrance.z,dd=Math.hypot(dx,dz)||1;
    if(dd<SC.entrance.r+1){player.position.x=SC.entrance.x+dx/dd*(SC.entrance.r+2.5);player.position.z=SC.entrance.z+dz/dd*(SC.entrance.r+2.5);}
  },
  romp(){ /* 场景内小庆祝:三连跳(不跳页) */ this.hide();celebrateHops=3; }
};
let celebrateHops=0;
function tryEnter(){
  if(overlayOpen||performance.now()<entranceCool)return;
  const d=Math.hypot(player.position.x-SC.entrance.x,player.position.z-SC.entrance.z);
  if(d>SC.entrance.r)return;
  const lv=nextLevel();
  if(lv){window.QZ&&QZ.openLevel(lv.key);}
  else{celebrateHops=4;entranceCool=performance.now()+3000;} // 场景全通:庆祝跳
}

const camPos=new THREE.Vector3(0,5.2,17);
const clock=new THREE.Clock();
function step(){
  const dt=Math.min(.05,clock.getDelta());const now=performance.now();
  if(!overlayOpen){
    let turn=0;
    if(keys.ArrowLeft||keys.a)turn=1;
    if(keys.ArrowRight||keys.d)turn=-1;
    heroYaw+=turn*1.7*dt+touchTurn;touchTurn*=.5;
    let want=touching||keys.ArrowUp||keys.w||(autoT&&now<autoT+3000);
    if(celebrateHops>0&&!hop.active)want=true;
    if(!hop.active){
      hop.rest-=dt;
      if(want&&hop.rest<=0){
        hop.active=true;hop.t=0;
        hop.fx=player.position.x;hop.fz=player.position.z;
        const yaw=celebrateHops>0?heroYaw+Math.PI*2*Math.random():heroYaw;
        const len=celebrateHops>0?.6:HOP_LEN;
        hop.tx=Math.max(-26,Math.min(26,hop.fx+Math.sin(yaw)*len));
        hop.tz=Math.max(-30,Math.min(13,hop.fz+Math.cos(yaw)*len));
      }
    }
    if(hop.active){
      hop.t+=dt/HOP_DUR;
      const p=Math.min(1,hop.t);
      player.position.x=hop.fx+(hop.tx-hop.fx)*p;
      player.position.z=hop.fz+(hop.tz-hop.fz)*p;
      player.position.y=(celebrateHops>0?HOP_H*1.4:HOP_H)*Math.sin(Math.PI*p);
      const st=1+.12*Math.sin(Math.PI*p);
      player.scale.set(1/Math.sqrt(st),st,1/Math.sqrt(st));
      if(p>=1){
        hop.active=false;hop.rest=REST;
        player.position.y=0;player.scale.set(1.09,.86,1.09);
        snowCrunch();
        if(celebrateHops>0)celebrateHops--;
        else tryEnter();                   // 每次落地检查是否进圈
      }
    }else player.scale.lerp(new THREE.Vector3(1,1,1),.25);
    player.rotation.y=THREE.MathUtils.lerp(player.rotation.y,heroYaw,.22);
  }
  if(mixer)mixer.update(dt);
  const pulse=1+Math.sin(now/560)*.06;    // 入口呼吸
  ering.scale.set(pulse,pulse,1);
  const back=new THREE.Vector3(Math.sin(heroYaw+Math.PI)*7.4,3.4,Math.cos(heroYaw+Math.PI)*7.4).add(player.position);
  camPos.lerp(back,.09);cam.position.copy(camPos);
  cam.lookAt(player.position.x,2.9,player.position.z);
  backdrop.position.x=-player.position.x*.28;
  if(snowPts){const pp=snowPts.geometry.attributes.position;
    for(let i=0;i<130;i++){let y=pp.getY(i)-spd[i]*dt;if(y<0)y=34;pp.setY(i,y);}
    pp.needsUpdate=true;}
  renderer.render(scene,cam);
  requestAnimationFrame(step);
}
renderLanterns(false);
step();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
window.__scene={pos:()=>player.position.toArray(),tp:(x,z)=>{player.position.set(x,0,z);},next:()=>nextLevel()&&nextLevel().key,done:doneCount,total:()=>seqLevels().length,enter:tryEnter,land:()=>{player.position.y=0;snowCrunch();tryEnter();}};
</script></body></html>
