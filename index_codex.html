<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>棋子大冒险 · 围棋启蒙 v0.2</title>
<style>
  :root {
    --cloud-white:#F8F3E8;
    --cream:#FFF7E8;
    --warm-wood:#D9A86C;
    --soft-gold:#F2C76E;
    --sage-green:#77B77A;
    --rabbit-pink:#F5AFC1;
    --sky-blue:#9DCAE8;
    --ink-stone:#2D2B28;
    --wood-dark:#9B6A34;
    --mist:#EEE7DA;
    --stone-shadow:0 8px 20px rgba(94,68,35,.18), inset 0 2px 0 rgba(255,255,255,.75);
    --wood-shadow:0 7px 0 rgba(132,83,33,.26), 0 16px 30px rgba(103,75,40,.16);
    --round:18px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(circle at 18% 12%, rgba(255,255,255,.92) 0 7%, transparent 17%),
      radial-gradient(circle at 78% 8%, rgba(255,255,255,.76) 0 8%, transparent 19%),
      radial-gradient(circle at 88% 76%, rgba(157,202,232,.22) 0 12%, transparent 24%),
      linear-gradient(180deg, var(--cloud-white), var(--cream) 52%, #F4E4C9);
    color:var(--ink-stone);
    display:flex; flex-direction:column; align-items:center; user-select:none;
  }
  header {
    width:100%; max-width:760px; display:grid; grid-template-columns:auto minmax(0,1fr) auto;
    align-items:center; gap:10px; padding:10px 12px 8px; position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg, rgba(255,247,232,.95), rgba(255,247,232,.62));
    backdrop-filter:blur(8px);
  }
  header .ttl {
    min-width:0; justify-self:center; display:flex; align-items:center; justify-content:center;
    min-height:46px; padding:7px 16px 7px 48px; border:2px solid rgba(217,168,108,.8);
    border-radius:999px; color:#8B5E2D; background:linear-gradient(180deg,#FFFDF7,#F5E8D3);
    font-size:clamp(15px,3.2vw,20px); font-weight:800; white-space:nowrap; box-shadow:var(--stone-shadow);
    position:relative; overflow:hidden;
  }
  header .ttl::before {
    content:""; position:absolute; left:7px; top:50%; width:34px; height:34px; transform:translateY(-50%);
    border-radius:50%; background:
      radial-gradient(circle at 36% 40%, #fff 0 30%, transparent 31%),
      radial-gradient(circle at 64% 40%, #fff 0 30%, transparent 31%),
      radial-gradient(circle at 48% 58%, var(--rabbit-pink) 0 11%, transparent 12%),
      linear-gradient(180deg,#fff,#F2E7DA);
    border:2px solid var(--soft-gold); box-shadow:inset 0 2px 0 rgba(255,255,255,.9);
  }
  .pill {
    border:2px solid var(--soft-gold); background:radial-gradient(circle at 35% 24%, #fff 0 18%, #F8F3E8 42%, #EBDDCA 100%);
    color:#775229; font-size:14px; min-width:44px; height:44px; padding:0 10px; border-radius:999px;
    cursor:pointer; font-weight:800; white-space:nowrap; box-shadow:var(--stone-shadow);
  }
  #stars::before {
    content:""; display:inline-block; width:16px; height:16px; margin-right:4px; vertical-align:-2px;
    background:var(--soft-gold);
    clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 92%,50% 70%,21% 92%,32% 57%,2% 35%,39% 35%);
    filter:drop-shadow(0 1px 1px rgba(126,86,28,.25));
  }
  @media (max-width:480px){
    header{grid-template-columns:auto 1fr auto;padding:8px 7px;gap:5px;}
    header .ttl{min-height:40px;padding:6px 10px 6px 40px;font-size:14px;}
    header .ttl::before{width:28px;height:28px;left:6px;}
    .pill{font-size:12px;min-width:36px;height:36px;padding:0 7px;}
  }
  .pill:active { transform:scale(.95); }
  main { width:100%; max-width:760px; flex:1; display:flex; flex-direction:column; align-items:center; padding:0 12px 24px; }
  .screen { width:100%; display:none; flex-direction:column; align-items:center; }
  .screen.on { display:flex; }
  #pathbar { width:100%; display:flex; align-items:center; gap:6px; padding:10px 14px; background:var(--cream);
    border-radius:16px; margin:6px 0 10px; overflow-x:auto; }
  .pdot { min-width:12px; height:12px; border-radius:50%; background:var(--mist); cursor:pointer; }
  .pdot.done { background:var(--sage-green); }
  .pdot.cur { background:var(--soft-gold); box-shadow:0 0 0 4px rgba(242,199,110,.25); }
  .pline { flex:1; height:3px; min-width:8px; background:var(--mist); border-radius:2px; }
  .pline.done { background:rgba(119,183,122,.42); }
  #pathlabel { font-size:13px; color:#8B5E2D; white-space:nowrap; font-weight:700; margin-left:4px; }
  #rankbar { width:100%; background:linear-gradient(180deg,#FFFDF7,var(--cream)); border:2px solid rgba(217,168,108,.7); border-radius:18px; padding:10px 14px 9px; margin:8px 0 10px; box-shadow:var(--stone-shadow); }
  .rkline { display:flex; align-items:center; gap:4px; }
  .rk { font-size:11px; font-weight:800; color:#8B5E2D; white-space:nowrap; }
  .rk.dim { color:#c2b89f; }
  .rl { flex:1; height:5px; border-radius:3px; background:#EFEAE0; position:relative; overflow:hidden; min-width:10px; }
  .rl i { position:absolute; left:0; top:0; bottom:0; background:var(--sage-green); border-radius:3px; }
  .rl.dash { flex:.7; background:repeating-linear-gradient(90deg,#ddd 0 5px,transparent 5px 9px); }
  .rkfuture { font-size:10px; color:#c2b89f; white-space:nowrap; margin-left:2px; }
  .rankb { font-size:10px; font-weight:700; background:#FFF1C9; color:#a9772a; border-radius:999px;
    padding:1px 6px; white-space:nowrap; }
  #rankNote { width:100%; text-align:center; font-size:11px; color:#b3a184; margin:8px 0 2px; line-height:1.6; }
  .cloud-map {
    width:100%; min-height:860px; position:relative; border-radius:28px; margin:2px 0 14px;
    background:
      radial-gradient(circle at 14% 20%, rgba(255,255,255,.82) 0 9%, transparent 20%),
      radial-gradient(circle at 78% 34%, rgba(255,255,255,.72) 0 10%, transparent 24%),
      radial-gradient(circle at 28% 72%, rgba(255,255,255,.76) 0 12%, transparent 26%),
      linear-gradient(180deg, rgba(248,243,232,.96), rgba(255,247,232,.92));
    overflow:hidden; border:1px solid rgba(217,168,108,.16); box-shadow:0 10px 26px rgba(103,75,40,.07);
  }
  .cloud-map::before,.cloud-map::after {
    content:""; position:absolute; left:-8%; right:-8%; height:120px; border-radius:50%;
    background:radial-gradient(circle at 12% 52%, rgba(255,255,255,.9) 0 11%, transparent 12%),
      radial-gradient(circle at 27% 42%, rgba(255,255,255,.84) 0 16%, transparent 17%),
      radial-gradient(circle at 45% 58%, rgba(255,255,255,.92) 0 13%, transparent 14%),
      radial-gradient(circle at 66% 42%, rgba(255,255,255,.86) 0 18%, transparent 19%),
      radial-gradient(circle at 84% 56%, rgba(255,255,255,.94) 0 15%, transparent 16%);
    pointer-events:none;
  }
  .cloud-map::before{top:-38px}.cloud-map::after{bottom:-44px}
  .route-svg { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
  .route-shadow { fill:none; stroke:rgba(145,96,43,.08); stroke-width:9; stroke-linecap:round; stroke-linejoin:round; }
  .route-path { fill:none; stroke:rgba(217,168,108,.78); stroke-width:5; stroke-linecap:round; stroke-linejoin:round; }
  .route-grain { fill:none; stroke:rgba(255,247,232,.72); stroke-width:1.5; stroke-linecap:round; stroke-dasharray:8 16; }
  .map-node {
    position:absolute; width:50px; min-height:50px; transform:translate(-50%,-50%); border:0; background:transparent;
    font-family:inherit; color:var(--ink-stone); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .map-node:active { transform:translate(-50%,-50%) scale(.95); }
  .stone {
    width:38px; height:38px; border-radius:50%; position:relative; display:block;
    border:2px solid rgba(242,199,110,.84); box-shadow:0 5px 0 rgba(148,101,46,.12), 0 10px 18px rgba(83,59,27,.1), inset 0 3px 8px rgba(255,255,255,.7);
  }
  .map-node.done .stone { background:radial-gradient(circle at 34% 24%, #6F6B63, var(--ink-stone) 58%, #12110F 100%); }
  .map-node.done:nth-of-type(even) .stone { background:radial-gradient(circle at 34% 24%, #fff, #F2ECE2 58%, #D9D1C4 100%); }
  .map-node.done .stone::after {
    content:""; position:absolute; right:-3px; bottom:1px; width:13px; height:13px;
    background:var(--soft-gold); clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 92%,50% 70%,21% 92%,32% 57%,2% 35%,39% 35%);
    filter:drop-shadow(0 2px 2px rgba(111,75,25,.28));
  }
  .map-node.cur { width:112px; min-height:116px; z-index:4; }
  .map-node.cur .stone {
    width:78px; height:78px; background:radial-gradient(circle at 35% 22%, #fff, #F6EFE6 60%, #DED3C3 100%);
    border:4px solid var(--sage-green);
    box-shadow:0 0 0 10px rgba(119,183,122,.22), 0 0 28px rgba(119,183,122,.58), 0 10px 0 rgba(148,101,46,.14), inset 0 4px 10px rgba(255,255,255,.86);
  }
  .map-node.cur .stone::before {
    content:""; position:absolute; left:50%; top:-30px; width:28px; height:35px; transform:translateX(-50%);
    border-radius:17px 17px 17px 3px; background:var(--sage-green); border:3px solid var(--soft-gold);
    box-shadow:0 3px 8px rgba(91,120,77,.28); animation:pinbob 1.6s ease-in-out infinite;
  }
  .map-node.cur .stone::after {
    content:""; position:absolute; left:50%; top:-18px; width:9px; height:9px; transform:translateX(-50%);
    border-radius:50%; background:#fff; animation:pinbob 1.6s ease-in-out infinite;
  }
  .map-node:not(.cur).done { opacity:.82; }
  .map-node.lock .stone {
    background:
      radial-gradient(circle at 30% 54%, rgba(255,255,255,.98) 0 18%, transparent 19%),
      radial-gradient(circle at 52% 42%, rgba(255,255,255,.88) 0 24%, transparent 25%),
      radial-gradient(circle at 68% 58%, rgba(245,242,236,.95) 0 18%, transparent 19%),
      #E6DFD4;
    width:24px; height:24px; border-color:rgba(210,198,184,.42); box-shadow:0 4px 12px rgba(107,91,71,.05); opacity:.46;
  }
  .map-node.lock .stone::before {
    content:""; position:absolute; left:50%; top:8px; width:9px; height:7px; transform:translateX(-50%);
    border-radius:2px; background:rgba(175,164,151,.55); box-shadow:inset 0 -1px 0 rgba(0,0,0,.06);
  }
  .map-node.lock .stone::after {
    content:""; position:absolute; left:50%; top:3px; width:9px; height:8px; transform:translateX(-50%);
    border:2px solid rgba(175,164,151,.55); border-bottom:0; border-radius:8px 8px 0 0;
  }
  .node-title {
    display:none; max-width:112px; min-height:30px; padding:5px 9px; border-radius:999px; background:rgba(255,247,232,.94);
    border:1px solid rgba(217,168,108,.58); font-size:11px; font-weight:800; color:#745129; line-height:1.18;
    box-shadow:0 4px 10px rgba(107,75,42,.09);
  }
  .map-node.cur .node-title { display:block; }
  .map-node.lock .node-title { color:#A79A89; background:rgba(248,243,232,.72); }
  @media (max-width:480px){
    .cloud-map{min-height:1260px;}
    .map-node{width:46px;min-height:46px;}
    .stone{width:34px;height:34px;}
    .map-node.cur{width:108px;min-height:112px;}
    .map-node.cur .stone{width:74px;height:74px;}
    .node-title{font-size:10px;max-width:96px;}
  }
  .chap {
    width:100%; background:linear-gradient(180deg, rgba(255,253,247,.95), var(--cream));
    border-radius:22px; padding:14px 16px; margin:8px 0; border:3px solid var(--warm-wood);
    box-shadow:var(--wood-shadow); position:relative;
  }
  .chap::before {
    content:""; position:absolute; inset:7px; border:1px solid rgba(255,255,255,.76); border-radius:16px; pointer-events:none;
  }
  .chap.cur { margin-top:8px; }
  .chap.cur .pin { display:none; }
  @keyframes pinbob { 50% { transform:translateY(-5px); } }
  #mapToast { position:fixed; left:50%; bottom:64px; transform:translateX(-50%); max-width:86vw;
    background:rgba(74,51,24,.92); color:#fff; padding:9px 16px; border-radius:999px; font-size:14px;
    z-index:60; opacity:0; pointer-events:none; transition:opacity .3s; white-space:nowrap; }
  #mapToast.on { opacity:1; }
  .chap h2 { font-size:18px; display:flex; align-items:center; gap:8px; margin-bottom:12px; color:#765126; position:relative; z-index:1; }
  .chap h2 .cnt { margin-left:auto; font-size:15px; color:#8F6737; display:inline-flex; align-items:center; gap:4px; }
  .chap h2 .cnt::before {
    content:""; width:16px; height:16px; background:var(--soft-gold);
    clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 92%,50% 70%,21% 92%,32% 57%,2% 35%,39% 35%);
  }
  .nodes { display:grid; grid-template-columns:repeat(auto-fit,minmax(76px,1fr)); gap:12px; position:relative; z-index:1; }
  .node {
    min-width:0; width:100%; height:86px; border-radius:18px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; cursor:pointer; font-size:12px; font-weight:700;
    color:#5D4326; background:linear-gradient(180deg,#FFFDF7,#F2E8D9);
    border:2px solid rgba(217,168,108,.72); box-shadow:0 5px 0 rgba(145,96,43,.17), inset 0 2px 0 rgba(255,255,255,.9);
    padding:8px 6px; gap:5px; text-align:center; line-height:1.2;
  }
  .node .ic {
    width:30px; height:30px; border-radius:50%; border:2px solid var(--soft-gold);
    background:radial-gradient(circle at 34% 24%, #fff, #F3EDE3 62%, #D9D0C4 100%);
    box-shadow:0 3px 7px rgba(103,75,40,.16); font-size:0;
  }
  .node:active { transform:scale(.94); }
  .node.lock { background:linear-gradient(180deg,#F1ECE3,#E2D9CC) !important; color:#A79A89; box-shadow:none; border-color:#D2C6B8; }
  .node.lock .ic { background:#D9D1C7; border-color:#C5B8AA; position:relative; }
  .node.lock .ic::before { content:""; position:absolute; left:8px; top:13px; width:10px; height:8px; border-radius:2px; background:#AFA497; }
  .node.lock .ic::after { content:""; position:absolute; left:8px; top:6px; width:10px; height:9px; border:3px solid #AFA497; border-bottom:0; border-radius:8px 8px 0 0; }
  .node.done .ic { background:radial-gradient(circle at 34% 24%, #68645D, var(--ink-stone) 58%, #12110F 100%); }
  .node.done::after {
    content:""; width:12px; height:12px; margin-top:-5px; background:var(--soft-gold);
    clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 92%,50% 70%,21% 92%,32% 57%,2% 35%,39% 35%);
  }
  #bubble {
    width:100%; background:linear-gradient(180deg,#FFFDF7,var(--cream)); border:3px solid var(--sage-green); border-radius:18px;
    padding:11px 14px; font-size:18px; line-height:1.5; margin:4px 0 10px;
    display:flex; gap:10px; align-items:center; min-height:62px;
  }
  #bubble .panda { font-size:30px; }
  canvas { display:block; border-radius:14px; box-shadow:0 4px 14px rgba(120,80,20,.25); cursor:pointer; }
  .btnrow { display:flex; gap:9px; margin-top:13px; flex-wrap:wrap; justify-content:center; }
  .big { border:3px solid var(--soft-gold); border-radius:999px; font-size:18px; font-weight:800; padding:10px 18px; cursor:pointer; color:#fff; background:var(--sage-green); box-shadow:0 5px 0 rgba(102,126,71,.28), inset 0 2px 0 rgba(255,255,255,.25); }
  .big.alt { background:var(--sage-green); }
  .big.gray { background:#9E927F; }
  .big.blue { background:var(--sage-green); }
  .big:active { transform:scale(.95); }
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
  #modal.on { display:flex; }
  #modal .box { background:var(--cream); border:3px solid var(--warm-wood); border-radius:20px; max-width:460px; width:100%; max-height:84vh; overflow:auto; padding:20px; font-size:15px; line-height:1.7; }
  #modal h3 { color:#8B5E2D; margin:10px 0 6px; }
  #modal a { color:#5B7F5D; word-break:break-all; }
  .task { display:flex; align-items:center; gap:8px; background:#FFF7E8; border-radius:12px; padding:8px 12px; margin:6px 0; }
  .task input { width:20px; height:20px; }
  .res { background:rgba(119,183,122,.12); border-radius:12px; padding:8px 12px; margin:6px 0; }
  .res .lt { color:#999; font-size:13px; }
  .gloss { background:rgba(242,199,110,.22); border-radius:12px; padding:8px 12px; margin:6px 0; font-size:14px; }
  .confetti { position:fixed; top:-40px; font-size:28px; z-index:99; animation:fall 1.4s ease-in forwards; pointer-events:none; }
  @keyframes fall { to { transform:translateY(105vh) rotate(360deg); opacity:.2; } }
  .petal { position:fixed; top:-30px; z-index:99; pointer-events:none;
    width:14px; height:10px; border-radius:60% 40% 55% 45%;
    background:radial-gradient(ellipse at 35% 35%, #FFE3EC 0%, #FFB7CE 55%, #F797B8 100%);
    box-shadow:0 0 3px rgba(255,182,206,.5);
    animation:petalFall linear forwards; }
  @keyframes petalFall {
    0%   { transform:translate(0,0) rotate(0deg); opacity:1; }
    25%  { transform:translate(28px,26vh) rotate(140deg); }
    50%  { transform:translate(-22px,52vh) rotate(260deg); opacity:.95; }
    75%  { transform:translate(24px,78vh) rotate(400deg); }
    100% { transform:translate(-14px,106vh) rotate(520deg); opacity:.25; }
  }
  .shake { animation:shk .3s; }
  @keyframes shk { 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  #world { position:relative; width:100%; }
  #plaza { position:relative; width:100vw; margin-left:calc(50% - 50vw); height:min(76vh,calc(100vh - 200px)); border-radius:0; overflow:hidden; box-shadow:0 6px 20px rgba(80,120,90,.18); touch-action:none; cursor:pointer; background:var(--sky-blue); }
  #plazaBg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  #rab { position:absolute; height:30%; bottom:4%; left:50%; transform:translateX(-50%); transition:left 1.05s ease,transform .2s ease; pointer-events:none; filter:drop-shadow(0 5px 5px rgba(0,0,0,.18)); animation:bob 1.6s ease-in-out infinite; }
  @keyframes bob { 50%{ margin-bottom:6px; } }
  .hot { position:absolute; transform:translate(-50%,-50%); background:rgba(255,247,232,.84); border:2px solid #fff; border-radius:999px; padding:5px 11px; font-size:13px; font-weight:700; color:#5B7F5D; cursor:pointer; white-space:nowrap; box-shadow:0 2px 8px rgba(0,0,0,.2); }
  .hot.lock { opacity:.55; color:#888; }
  .hot.dot { padding:2px 5px; font-size:11px; background:rgba(255,255,255,.55); border-width:1px; box-shadow:0 1px 4px rgba(0,0,0,.12); }
  @media (max-width:480px){ .hot.dot{font-size:10px;padding:1px 4px;} }
  .hot.cur { font-size:16px; padding:8px 15px; border-color:var(--soft-gold); background:rgba(255,252,240,.95); }
  .hot.cur .pinIco {
    display:inline-block; width:14px; height:18px; margin-right:3px; vertical-align:-3px;
    border-radius:10px 10px 10px 2px; background:var(--sage-green); border:2px solid var(--soft-gold);
    animation:pinbob2 1.6s ease-in-out infinite;
  }
  .hot.cur .pinIco::after { content:""; display:block; width:4px; height:4px; margin:4px auto 0; border-radius:50%; background:#fff; }
  .hot.dot.lock::before {
    content:""; display:inline-block; width:10px; height:8px; border-radius:2px; background:#AFA497; vertical-align:middle;
  }
  .hot.dot.done::before {
    content:""; display:inline-block; width:12px; height:12px; background:var(--soft-gold); vertical-align:middle;
    clip-path:polygon(50% 0,61% 35%,98% 35%,68% 57%,79% 92%,50% 70%,21% 92%,32% 57%,2% 35%,39% 35%);
  }
  @keyframes pinbob2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .hot:active { transform:translate(-50%,-50%) scale(.93); }
  #wHint, #iHint { text-align:center; color:#5B7F5D; font-size:15px; margin:10px 0 2px; min-height:22px; }
  #fade, #ifade { position:absolute; inset:0; background:var(--cloud-white); opacity:0; pointer-events:none; transition:opacity .45s; z-index:5; }
  #fade.on, #ifade.on { opacity:1; }
  #insideWrap { position:relative; width:100%; aspect-ratio:16/9; border-radius:18px; overflow:hidden; box-shadow:0 6px 20px rgba(80,120,90,.28); background:var(--sky-blue); }
  #insideBg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; animation:kb 16s ease-in-out infinite alternate; }
  @keyframes kb { from{ transform:scale(1) translate(0,0);} to{ transform:scale(1.12) translate(-2%,-1.5%);} }
</style>
</head>
<body>
<header>
  <button class="pill" id="backBtn" style="visibility:hidden">‹ 地图</button>
  <div class="ttl" id="ttl">棋子大冒险</div>
  <div style="display:flex;gap:7px">
    <button class="pill" id="worldBtn" style="display:none">看风景</button>
    <button class="pill" id="stars">0</button>
    <button class="pill" id="sndBtn">声</button>
    <button class="pill" id="langBtn" title="语音语言">中</button>
    <button class="pill" id="parentBtn">家长</button>
  </div>
</header>
<main>

function nbrs(c,r,N){const a=[];if(c>0)a.push([c-1,r]);if(c<N-1)a.push([c+1,r]);if(r>0)a.push([c,r-1]);if(r<N-1)a.push([c,r+1]);return a;}
function groupLibs(g,c,r){
  const N=g.length,color=g[c][r],seen=new Set([c+","+r]),libs=new Set(),st=[[c,r]],stones=[];
  while(st.length){const[x,y]=st.pop();stones.push([x,y]);
    for(const[nx,ny]of nbrs(x,y,N)){const k=nx+","+ny;
      if(g[nx][ny]===0)libs.add(k);
      else if(g[nx][ny]===color&&!seen.has(k)){seen.add(k);st.push([nx,ny]);}}}
  return{stones,libs};
}
const clone=g=>g.map(c=>c.slice());
function tryPlace(g,c,r,color){
  if(g[c][r]!==0)return{ok:false};
  const N=g.length,g2=clone(g);g2[c][r]=color;const captured=[];
  for(const[nx,ny]of nbrs(c,r,N)){
    if(g2[nx][ny]===3-color){const gr=groupLibs(g2,nx,ny);
      if(gr.libs.size===0)for(const[sx,sy]of gr.stones){if(g2[sx][sy]!==0){g2[sx][sy]=0;captured.push([sx,sy]);}}}}
  if(groupLibs(g2,c,r).libs.size===0)return{ok:false,suicide:true};
  return{ok:true,g2,captured};
}
function groupsOf(g,color){
  const N=g.length,seen=new Set(),out=[];
  for(let c=0;c<N;c++)for(let r=0;r<N;r++)
    if(g[c][r]===color&&!seen.has(c+","+r)){const gr=groupLibs(g,c,r);
      gr.stones.forEach(([x,y])=>seen.add(x+","+y));out.push(gr);}
  return out;
}

  cell=cssSize/(N+0.4); pad=(cssSize-cell*(N-1))/2; draw();
}
const px=i=>pad+i*cell;
function draw(){
  const N=cur.size;
  cx.fillStyle="#E9C37E";cx.fillRect(0,0,cssSize,cssSize);
  cx.strokeStyle="#8a6b3f";cx.lineWidth=1.5;
  for(let i=0;i<N;i++){
    cx.beginPath();cx.moveTo(px(0),px(i));cx.lineTo(px(N-1),px(i));cx.stroke();
    cx.beginPath();cx.moveTo(px(i),px(0));cx.lineTo(px(i),px(N-1));cx.stroke();}
  if(N===7){cx.fillStyle="#8a6b3f";cx.beginPath();cx.arc(px(3),px(3),4,0,7);cx.fill();}
  const R=cell*0.44;
  for(let c=0;c<N;c++)for(let r=0;r<N;r++){
    const v=B[c][r];if(!v)continue;
    const X=px(c),Y=px(r),gr=cx.createRadialGradient(X-R*.35,Y-R*.35,R*.15,X,Y,R);
    if(v===1){gr.addColorStop(0,"#666");gr.addColorStop(1,"#0a0a0a");}
    else{gr.addColorStop(0,"#fff");gr.addColorStop(1,"#cfcfcf");}
    cx.fillStyle=gr;cx.beginPath();cx.arc(X,Y,R,0,7);cx.fill();
    if(v===2){cx.strokeStyle="#aaa";cx.lineWidth=1;cx.stroke();}}
  for(const m of marks){
    const X=px(m.c),Y=px(m.r);
    if(m.t==="lib"){cx.fillStyle="#56A95C";cx.beginPath();cx.arc(X,Y,cell*.22,0,7);cx.fill();
      cx.fillStyle="#fff";cx.font="bold "+(cell*.26)+"px sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText("气",X,Y);}
    else if(m.t==="hint"){cx.strokeStyle="#E8924A";cx.lineWidth=4;cx.setLineDash([6,5]);
      cx.beginPath();cx.arc(X,Y,cell*.38,0,7);cx.stroke();cx.setLineDash([]);
      cx.font=(cell*.5)+"px sans-serif";cx.textAlign="center";cx.fillText("👆",X+cell*.45,Y-cell*.35);}
    else if(m.t==="cand"){cx.strokeStyle="#5B8DD9";cx.lineWidth=4;cx.setLineDash([2,4]);
      cx.beginPath();cx.arc(X,Y,cell*.38,0,7);cx.stroke();cx.setLineDash([]);}
    else if(m.t==="warn"){cx.font=(cell*.55)+"px sans-serif";cx.textAlign="center";cx.textBaseline="middle";cx.fillText("⚡",X,Y-cell*.55);}}
  if(lastMove){const[c,r,v]=lastMove;
    cx.strokeStyle=v===1?"#fff":"#333";cx.lineWidth=2.5;
    cx.beginPath();cx.arc(px(c),px(r),R*.45,0,7);cx.stroke();}
}

function tts(t,lg){
  try{if(curAudio)curAudio.pause();}catch(e){}
  try{const u=new SpeechSynthesisUtterance(t);u.lang=lg||"zh-CN";u.rate=0.8;u.pitch=1.02;

/* 播放一条 manifest 行：非中文优先 line.tr[LANG].file，再 tr[LANG].text 走 TTS，否则回落中文 mp3 */
function playLine(line){
  if(!line)return false;
  if(LANG!=="zh"&&line.tr&&line.tr[LANG]){
    const tr=line.tr[LANG];
    if(tr.file&&playVO(tr.file))return true;
    if(tr.text){tts(tr.text,LANG==="en"?"en-US":"de-DE");return true;}

let actx=null;
function tone(seq){if(!soundOn)return;
  try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();let t=actx.currentTime;
    for(const[f,d]of seq){const o=actx.createOscillator(),g=actx.createGain();
      o.frequency.value=f;o.type="triangle";o.connect(g);g.connect(actx.destination);
      g.gain.setValueAtTime(.0001,t);g.gain.linearRampToValueAtTime(.11,t+.025);
      g.gain.exponentialRampToValueAtTime(.001,t+d);
      o.start(t);o.stop(t+d);t+=d*.9;}}catch(e){}}

function chRank(id){

  if(id===7)return"20K–18K";

function buildMap(){
  const m=$("map");m.innerHTML="";
  const fp=freeplay();
  /* 当前章 = 第一个未完成的章（顺序解锁下即"第一个未完成且已解锁"） */
  let curIdx=CH.findIndex((c,i)=>!chapDone(i));
  if(curIdx<0)curIdx=CH.length-1;
  let sel=mapSel;
  if(sel<0||sel>=CH.length||!(fp||chapUnlocked(sel)))sel=curIdx;
  /* 顶部晋升路线：25K→10K→5K 实线（按整章通关比例填充），之后灰色虚段=未来内容 */
  const doneN=CH.reduce((a,c,i)=>a+(chapDone(i)?1:0),0);
  const f=CH.length?doneN/CH.length:0;
  const f1=Math.round(Math.min(1,f*2)*100),f2=Math.round(Math.max(0,Math.min(1,(f-.5)*2))*100);
  const rb=document.createElement("div");rb.id="rankbar";
  rb.innerHTML=`<div class="rkline">
    <span class="rk">25K</span><span class="rl"><i style="width:${f1}%"></i></span>
    <span class="rk">10K</span><span class="rl"><i style="width:${f2}%"></i></span>
    <span class="rk">5K</span><span class="rl dash"></span>
    <span class="rk dim">1K</span><span class="rl dash"></span>
    <span class="rk dim">1D</span><span class="rl dash"></span>
    <span class="rk dim">5D</span><span class="rkfuture">未来内容</span>
  </div>`;
  m.appendChild(rb);
  /* 云上棋路：章节节点只改渲染，解锁和当前章逻辑保持原接口 */
  const route=document.createElement("div");route.className="cloud-map";
  const compact=window.matchMedia&&window.matchMedia("(max-width:480px)").matches;
  const cols=compact?1:4;
  const xs=compact?[50]:[12,37,63,88];
  const yStep=compact?2.75:9.8;
  const y0=compact?4.2:7.4;
  const pts=CH.map((ch,i)=>{
    const row=Math.floor(i/cols),rawCol=i%cols,col=row%2?cols-1-rawCol:rawCol;
    const drift=compact?Math.sin(i*.78)*22:0;
    const y=y0+row*yStep+(compact?0:(rawCol%2?2.8:-1.6));
    return{x:xs[col]+drift,y:Math.min(95,y)};
  });
  const path=pts.reduce((s,p,i)=>{
    if(i===0)return`M ${p.x} ${p.y}`;
    const a=pts[i-1],mx=(a.x+p.x)/2+(compact?Math.sin(i*.55)*7:0),my=(a.y+p.y)/2+(i%2?3.6:-3.6);
    return`${s} Q ${mx} ${my} ${p.x} ${p.y}`;
  },"");
  route.innerHTML=`<svg class="route-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
    <path class="route-shadow" d="${path}"></path>
    <path class="route-path" d="${path}"></path>
    <path class="route-grain" d="${path}"></path>
  </svg>`;
  CH.forEach((ch,i)=>{
    const unlocked=fp||chapUnlocked(i);
    const cd=chapDone(i);
    const chip=document.createElement("button");
    chip.className="map-node"+(i===sel?" cur":"")+(unlocked?"":" lock")+(cd?" done":"");
    chip.style.left=pts[i].x+"%";
    chip.style.top=pts[i].y+"%";
    chip.title=ch.name;
    const nm=(ch.name.split("·")[0]||"").trim();
    const rk=chRank(ch.id);
    chip.innerHTML=`<span class="stone"></span><span class="node-title">${nm}${rk?`<br>${rk}`:""}</span>`;
    chip.onclick=()=>{
      if(!unlocked){mapToast("先通过前面的章节哦");say("先通过前面的章节哦");return;}
      mapSel=i;buildMap();
      const card=document.querySelector("#map .chap.cur");
      if(card)card.scrollIntoView({block:"center",behavior:"smooth"});
    };
    route.appendChild(chip);
  });
  m.appendChild(route);
  /* 当前章：云石卡片 + 木边框 */
  const ch=CH[sel];
  const d=document.createElement("div");d.className="chap cur";
  const done=ch.levels.filter(l=>prog[l.key]).length;
  const ZIMG={1:"zone_gate",7:"zone_lounge",8:"zone_spring",10:"zone_temple"};
  const zi=ZIMG[ch.id]?`<img src="assets/v2/${ZIMG[ch.id]}.png" style="width:100%;height:88px;object-fit:cover;border-radius:14px;margin-bottom:8px" onerror="this.remove()">`:"";
  const rk=chRank(ch.id);
  d.innerHTML=`<span class="pin"></span>`+zi+`<h2>${ch.name}${rk?`<span class="rankb">${rk}</span>`:""}<span class="cnt">${done}/${ch.levels.length}</span></h2>`;
  const ns=document.createElement("div");ns.className="nodes";
  let firstOpen=FLAT.findIndex(l=>!prog[l.key]);if(firstOpen<0)firstOpen=FLAT.length;
  ch.levels.forEach(lv=>{
    const n=document.createElement("div");

    n.className="node"+(lock?" lock":"")+(prog[lv.key]?" done":"");
    n.innerHTML=`<span class="ic"></span>${lv.name}`;
    n.onclick=()=>{if(lock){mapToast("先通过前面的关卡哦！");msg("先通过前面的关卡哦！");say("先通过前面的关卡哦");return;}start(lv);};
    ns.appendChild(n);
  });
  d.appendChild(ns);m.appendChild(d);
  /* 底部小字说明 */
  const note=document.createElement("div");note.id="rankNote";
  note.textContent="级位徽章 = 本章知识点常见对应区间；真实棋力需要题量 + 真人对局，通关 ≠ 达标";
  m.appendChild(note);
}

  if(cur.t==="play"){const h=suggest(B);
    if(h){marks=[{c:h.pt[0],r:h.pt[1],t:"hint"}];draw();msg("下在橙色圈圈！"+h.why,false);say(h.why);}
    else msg("挨着自己的棋下，往气多的地方走！");return;}
}
function findCapture(g,color){
  const N=g.length;
  for(let c=0;c<N;c++)for(let r=0;r<N;r++){const t=tryPlace(g,c,r,color);
    if(t.ok&&t.captured.length>0)return[c,r];}
  return null;
}
function suggest(g){
  // 极小极大搜索提示:保证跟着提示走是全局好棋(用户反馈:旧口诀提示会送死)
  const N=g.length,DEPTH=N<=7?4:N<=9?3:2,WIN=100000;
  function candidates(gg,color){
    const opp=3-color,set=new Map();
    const addPt=(c,r,pri)=>{const k=c+","+r;
      if(gg[c][r]!==0)return;
      if(!set.has(k)||set.get(k).pri<pri)set.set(k,{c,r,pri});};
    for(const q of groupsOf(gg,opp)){
      if(q.libs.size<=2)for(const k of q.libs){const[c,r]=k2p(k);addPt(c,r,q.libs.size===1?9:6);}
    }
    for(const q of groupsOf(gg,color)){
      if(q.libs.size<=2)for(const k of q.libs){const[c,r]=k2p(k);addPt(c,r,q.libs.size===1?8:5);}
    }
    for(let c=0;c<N;c++)for(let r=0;r<N;r++)if(gg[c][r]!==0)
      for(const[a,b]of nbrs(c,r,N))addPt(a,b,2);
    const mid=(N-1)/2;
    addPt(Math.floor(mid),Math.floor(mid),1);
    addPt(Math.floor(mid)-1,Math.floor(mid),1);addPt(Math.floor(mid),Math.floor(mid)-1,1);
    return[...set.values()].sort((a,b)=>b.pri-a.pri).slice(0,14);
  }
  function evalBoard(gg,color){
    let sc=0;
    for(const q of groupsOf(gg,color)){
      sc+=Math.min(q.libs.size,4)*2+q.stones.length;
      if(q.libs.size===1)sc-=30;
    }
    for(const q of groupsOf(gg,3-color)){
      sc-=Math.min(q.libs.size,4)*2+q.stones.length;
      if(q.libs.size===1)sc+=26;
    }
    return sc;
  }
  function negamax(gg,color,depth){
    const cands=candidates(gg,color);
    let best=-Infinity,bp=null;
    for(const m of cands){
      const t=tryPlace(gg,m.c,m.r,color);
      if(!t.ok)continue;
      let v;
      if(t.captured.length>0)v=WIN-(DEPTH-depth)*10+t.captured.length;
      else if(groupLibs(t.g2,m.c,m.r).libs.size<2&&cands.length>2)continue;
      else if(depth<=1)v=evalBoard(t.g2,color);
      else{const r=negamax(t.g2,3-color,depth-1);v=-(r?r.v:evalBoard(t.g2,3-color));}
      if(v>best){best=v;bp=[m.c,m.r];}
    }
    return bp?{v:best,pt:bp}:null;
  }
  const r=negamax(g,1,DEPTH);
  if(!r)return null;
  const[c,rr]=r.pt;
  const t=tryPlace(g,c,rr,1);
  let why="第四步诀：占中间，挨着自己的棋，气多的地方最安全";
  if(t.captured&&t.captured.length>0)why="第二步诀：白棋只剩一口气！堵住这里，马上吃掉它！";
  else{
    const wasAtari=groupsOf(g,1).some(q=>q.libs.size===1&&q.libs.has(c+","+rr));
    const dbl=groupsOf(t.g2,2).filter(x=>x.libs.size===1).length;
    if(wasAtari)why="第一步诀：你的棋只剩一口气啦！从这里逃，气就变多了";
    else if(dbl>=2)why="第三步诀：魔法点！下这里同时打吃两块白棋，它救不过来！";
    else if(dbl===1)why="追击！下这里白棋就只剩一口气，它得赶紧逃";
  }
  return{pt:[c,rr],why};
}

/* ---------- AI ---------- */
function aiMove(g,prof){
  const N=g.length,legal=[],scoreMode=cur&&cur.play&&cur.play.goal==="score";
  for(let c=0;c<N;c++)for(let r=0;r<N;r++){
    if(koPt&&c===koPt[0]&&r===koPt[1])continue;
    const t=tryPlace(g,c,r,2);if(!t.ok)continue;
    if(scoreMode&&t.captured.length===0&&nbrs(c,r,N).every(([a,b])=>g[a][b]===2))continue;
    legal.push({c,r,t});
  }
  if(!legal.length)return null;
  const caps=legal.filter(m=>m.t.captured.length>0);
  if(scoreMode&&passCnt>=1&&!caps.length&&!groupsOf(g,2).some(x=>x.libs.size===1))return null;
  if(caps.length&&Math.random()<prof.capP)return[caps[0].c,caps[0].r];
  for(const gr of groupsOf(g,2))if(gr.libs.size===1){
    const[lc,lr]=k2p([...gr.libs][0]);const t=tryPlace(g,lc,lr,2);
    if(t.ok&&groupLibs(t.g2,lc,lr).libs.size>=2)return[lc,lr];}
  if(Math.random()<prof.rand){const m=legal[Math.floor(Math.random()*legal.length)];return[m.c,m.r];}
  const ataris=legal.filter(m=>{
    if(groupLibs(m.t.g2,m.c,m.r).libs.size<2)return false;
    return groupsOf(m.t.g2,1).some(x=>x.libs.size===1);});
  if(ataris.length&&Math.random()<prof.atariP){const m=ataris[Math.floor(Math.random()*ataris.length)];return[m.c,m.r];}
  let best=null,bs=-99;
  for(const m of legal){
    const my=groupLibs(m.t.g2,m.c,m.r).libs.size;
    if(my<2&&legal.length>3)continue;
    let adj=0,adjB=0;
    for(const[nx,ny]of nbrs(m.c,m.r,N)){if(g[nx][ny]!==0)adj++;if(g[nx][ny]===1)adjB++;}
    const ctr=-(Math.abs(m.c-(N-1)/2)+Math.abs(m.r-(N-1)/2))*.3;
    const sc=my*.8+adjB*1.2+adj*.3+ctr+Math.random()*1.5;
    if(sc>bs){bs=sc;best=m;}}
  return best?[best.c,best.r]:[legal[0].c,legal[0].r];
}

/* ---------- 复盘 ---------- */
function note(g,c,r,color,res){
  if(color===2){
    if(res.captured.length>0)return"💔 白棋提子，对局结束。被吃的原因看上一条 ⚠️";
    if(groupsOf(res.g2,1).some(x=>x.libs.size===1))return"❗ 白棋打吃你了！下一手要逃命或反击";
    return"";
  }
  if(res.captured.length>0)return"🎉 吃子！这就是胜负手，干得漂亮！";
  if(groupsOf(res.g2,2).filter(x=>x.libs.size===1).length>=2)return"👍 双叫吃！魔法点，白棋只能救一边";
  const wasAtari=groupsOf(g,1).some(x=>x.libs.size===1);
  const nowAtari=groupsOf(res.g2,1).some(x=>x.libs.size===1);
  if(wasAtari&&!nowAtari)return"💪 及时逃命，好棋（第一步诀）";
  if(wasAtari&&nowAtari)return"⚠️ 你有棋子只剩一口气，这步没去救它！";
  const cap=findCapture(g,1);
  if(cap)return"💡 其实这步可以直接吃白棋（第 "+(cap[0]+1)+" 列第 "+(cap[1]+1)+" 行）";
  if(groupLibs(res.g2,c,r).libs.size===1)return"⚠️ 下完自己只剩一口气，危险！";
  return"";
}
function openReview(){
  if(busy){msg("糯糯正在想棋，等它下完再复盘哦！");return;}
  if(!hist.length){msg("还没下棋呢！先下几手，才有可以复盘的棋谱呀！");return;}
  rev={idx:0};
  drawRev();
  buttons([["◀ 上一手","gray",()=>{if(rev.idx>0){rev.idx--;drawRev();}}],
           ["下一手 ▶","blue",()=>{if(rev.idx<hist.length-1){rev.idx++;drawRev();}}],
           ["↩ 退出复盘","alt",()=>{rev=null;
             if(over)winButtons();else stdButtons();
             B=hist[hist.length-1].board.map(x=>x.slice());lastMove=null;draw();
             msg(over?"复盘结束！每盘棋看一遍自己的⚠️，进步飞快！":"回到对局，该你下啦！");}]]);
  say("复盘时间！我们一手一手看");
}
function drawRev(){
  const h=hist[rev.idx];
  B=h.board.map(x=>x.slice());lastMove=[h.c,h.r,h.col];marks=[];draw();

  if(h.note)say(h.note);
}

/* ---------- 点击处理 ---------- */
function handle(c,r){
  if(busy||over||rev)return;
  if(cur.t==="demo")return;
  const N=cur.size;
  if(c<0||r<0||c>=N||r>=N)return;

  if(cur.t==="lib"){
    const libs=groupLibs(B,cur.origin[0],cur.origin[1]).libs,k=c+","+r;
    if(libs.has(k)){
      if(!found.includes(k)){found.push(k);sCap();
        marks=found.map(x=>{const[a,b]=k2p(x);return{c:a,r:b,t:"lib"};});draw();
        if(found.length===libs.size)win(cur.winText||("太棒了！"+libs.size+" 口气全找到！"+cur.why+"！⭐"));
        else msg("找到一口气！还差 "+(libs.size-found.length)+" 口！");}}
    else if(B[c][r]!==0)fail("这是棋子本身，气在它旁边的空路口！");
    else fail("这里不挨着那颗棋子，看看它的上下左右！");
    return;
  }
  if(cur.t==="pick"){
    if(B[c][r]!==cur.pickColor){fail(B[c][r]===0?"要点棋子哦！":"点错颜色啦，再看看题目！");return;}
    const ans=groupLibs(B,cur.answer[0],cur.answer[1]).stones.map(p=>p.join(","));
    if(ans.includes(c+","+r)){
      marks=[...groupLibs(B,cur.answer[0],cur.answer[1]).libs].map(k=>{const[a,b]=k2p(k);return{c:a,r:b,t:"lib"};});
      draw();win(cur.winText||("答对啦！"+cur.why+"！⭐"));
    }else{
      const g=groupLibs(B,c,r);
      marks=[...g.libs].map(k=>{const[a,b]=k2p(k);return{c:a,r:b,t:"lib"};});draw();
      fail("你点的这块有 "+g.libs.size+" 口气，还不是最危险的，再找找！");
      setTimeout(()=>{marks=[];draw();},1500);
    }
    return;
  }
  if(cur.t==="point"){
    if(B[c][r]!==0){fail("这里已经有棋子啦！");return;}
    const res=tryPlace(B,c,r,1);
    const tl=cur.targets||[cur.target];
    if(res.ok&&tl.some(pp=>pp[0]===c&&pp[1]===r)){
      B=res.g2;lastMove=[c,r,1];marks=[];sPlace();draw();
      if(res.captured.length>0)setTimeout(()=>{sCap();draw();win("吃掉啦！"+cur.why+"！⭐");},220);
      else win("好棋！"+cur.why+"！⭐");
    }else{
      wrong++;
      if(wrong>=2){const hp=cur.targets?cur.targets[0]:cur.target;marks=[{c:hp[0],r:hp[1],t:"hint"}];draw();
        fail("看橙色圈圈——"+cur.why);}
      else fail("再想想！点『提示』糯糯告诉你位置和原因。");
    }
    return;
  }
  if(cur.t==="esc"||cur.t==="connect"){
    if(B[c][r]!==0){fail("这里已经有棋子啦！");return;}
    const res=tryPlace(B,c,r,1);
    if(!res.ok){fail("这里不能下哦！");return;}
    const hero=cur.t==="esc"?cur.hero:cur.heroes[0];
    const g=groupLibs(res.g2,hero[0],hero[1]);
    let okMove=g.libs.size>=2;
    if(cur.t==="connect"&&okMove)
      okMove=g.stones.some(p=>p[0]===cur.heroes[1][0]&&p[1]===cur.heroes[1][1]);
    if(okMove){B=res.g2;lastMove=[c,r,1];marks=[];sPlace();draw();
      win((cur.t==="connect"?"连上啦！":"得救啦！")+"现在有 "+g.libs.size+" 口气，安全了！"+cur.why+"！⭐");
    }else{
      wrong++;
      if(wrong>=2){marks=[{c:cur.best[0],r:cur.best[1],t:"hint"}];draw();}
      fail("哎呀，小黑还是只剩一口气！"+cur.why);
    }
    return;
  }
  if(cur.t==="choice"){
    const hit=cur.cands.find(x=>x.pt[0]===c&&x.pt[1]===r);
    if(!hit){fail("点闪光的两个点中的一个哦！");return;}
    if(hit.ok){const res=tryPlace(B,c,r,1);B=res.g2;lastMove=[c,r,1];marks=[];sPlace();draw();
      win(hit.why+"！⭐");}
    else fail(hit.why);
    return;
  }
  if(cur.t==="noentry"){
    const isCand=cur.cands.some(p=>p[0]===c&&p[1]===r);
    if(!isCand){fail("点闪光的点哦！");return;}
    if(c===cur.answer[0]&&r===cur.answer[1]){
      marks=[];draw();win("找到了！"+cur.why+"！⭐");
    }else{
      const res=tryPlace(B,c,r,1);
      if(res.ok){const g=groupLibs(res.g2,c,r);
        fail("这里可以下呀——你看它有 "+g.libs.size+" 口气。要找的是一口气都没有的禁入点！");}
      return;
    }
    return;
  }
  if(cur.t==="dbl"){
    if(B[c][r]!==0){fail("这里已经有棋子啦！");return;}
    if(dblStep===0){
      if(c===cur.hit[0]&&r===cur.hit[1]){
        const res=tryPlace(B,c,r,1);B=res.g2;lastMove=[c,r,1];marks=[];sPlace();draw();
        busy=true;msg(cur.m1||"双叫吃！两块白棋同时只剩一口气！白棋慌了……");
        setTimeout(()=>{
          const rr=tryPlace(B,cur.resp[0],cur.resp[1],2);
          if(rr.ok)B=rr.g2;lastMove=[cur.resp[0],cur.resp[1],2];sPlace();draw();
          busy=false;dblStep=1;
          msg((cur.m2||"白棋只救了一块！")+cur.why2);
        },1700);
      }else{
        wrong++;
        if(wrong>=2){marks=[{c:cur.hit[0],r:cur.hit[1],t:"hint"}];draw();}
        fail("再找找——要一颗棋子同时打吃两块白棋！"+(wrong>=2?cur.why:""));
      }
    }else{
      const res=tryPlace(B,c,r,1);
      if(res.ok&&res.captured.length>0){
        B=res.g2;lastMove=[c,r,1];sPlace();draw();
        setTimeout(()=>{sCap();draw();win("提子！双叫吃成功——这就是吃子棋最厉害的魔法！⭐");},220);
      }else fail("被打吃的那块白棋只剩一口气，堵住它最后的气！");
    }
    return;
  }
  if(cur.t==="play"){
    const P=cur.play||{goal:"cap1"},goal=P.goal||"cap1";
    const color=pvp?turn:1;
    if(koPt&&c===koPt[0]&&r===koPt[1]){fail("打劫！刚提过这里，要先去别处下一手，才能提回来。");return;}
    const res=tryPlace(B,c,r,color);
    if(!res.ok){fail(res.suicide?"这里下了会没有气（禁入点），不能下！":"这里已经有棋子啦！");return;}
    const n=note(B,c,r,color,res);
    koPt=koAfter(res,c,r);passCnt=0;
    B=res.g2;lastMove=[c,r,color];marks=[];sPlace();draw();
    hist.push({c,r,col:color,board:clone(B),note:n});
    if(pvp){
      if(res.captured.length>0){
        if(color===1)capMe+=res.captured.length;else capAI+=res.captured.length;
        if(goal==="cap1"){over=true;sWin();confetti();winButtons();
          msg((color===1?"黑棋":"白棋")+"先吃到子，赢啦！🏆");return;}
        if(goal==="capN"&&(capMe>=P.n||capAI>=P.n)){over=true;sWin();confetti();winButtons();
          msg((capMe>=P.n?"黑棋":"白棋")+"先吃满 "+P.n+" 颗，赢啦！🏆",false);
          say((capMe>=P.n?"黑棋":"白棋")+"先吃满了，赢啦！");return;}
        sCap();
      }
      turn=3-turn;msg(turn===1?"该黑棋啦！":"该白棋啦！",false);
      return;
    }
    if(res.captured.length>0){
      capMe+=res.captured.length;sCap();
      if(goal==="cap1"){win("你吃掉了对手的棋子！你赢啦！🏆 点『复盘』看看你的好棋！");return;}
      if(goal==="capN"&&capMe>=P.n){win("你先吃满 "+P.n+" 颗棋子，赢啦！🏆 点『复盘』看看你的好棋！","你先吃满棋子，赢啦！点复盘看看你的好棋！");return;}
      if(goal==="capN")msg("吃到 "+capMe+"/"+P.n+" 颗！继续追！",false);
    }
    aiTurn();
    return;
  }
}
function koAfter(res,c,r){
  if(res.captured.length!==1)return null;
  const gr=groupLibs(res.g2,c,r);
  return(gr.stones.length===1&&gr.libs.size===1)?res.captured[0]:null;
}
function aiTurn(){
  const P=cur.play||{goal:"cap1"},goal=P.goal||"cap1";
  busy=true;msg("对手想一想…",false);
  setTimeout(()=>{
    const mv=aiMove(B,cur.prof);
    if(!mv){
      busy=false;
      if(goal==="score"){
        passCnt++;
        if(passCnt>=2){scoreGame();return;}
        msg("糯糯停一手。你觉得下完了，就点『停一手』，我们来数子！");return;
      }
      win("对手没地方下啦，你赢了！🏆");return;
    }
    const r2=tryPlace(B,mv[0],mv[1],2);
    const n2=note(B,mv[0],mv[1],2,r2);
    koPt=koAfter(r2,mv[0],mv[1]);passCnt=0;
    B=r2.g2;lastMove=[mv[0],mv[1],2];sPlace();draw();busy=false;
    hist.push({c:mv[0],r:mv[1],col:2,board:clone(B),note:n2});
    if(r2.captured.length>0){
      capAI+=r2.captured.length;sCap();
      if(goal==="cap1"){over=true;sNo();winButtons();
        msg("啊呀，被吃掉了。点『复盘』，糯糯带你找原因——找到了下盘就能赢！");return;}
      if(goal==="capN"&&capAI>=P.n){over=true;sNo();winButtons();
        msg("啊呀，糯糯先吃满 "+P.n+" 颗了。点『复盘』找原因——下盘赢回来！",false);
        say("啊呀，糯糯先吃满了。点复盘找原因，下盘赢回来！");return;}
    }
    const danger=groupsOf(B,1).some(x=>x.libs.size===1);
    msg(danger?"⚡警报！你有棋子只剩一口气，先救命！":"该你下啦！",danger);
  },1600);
}
function doPass(){
  if(over||busy||!cur||cur.t!=="play")return;
  passCnt++;
  if(pvp){
    if(passCnt>=2){scoreGame();return;}
    const who=turn===1?"黑棋":"白棋";
    turn=3-turn;msg(who+"停一手。"+(turn===1?"该黑棋啦！":"该白棋啦！"),false);return;
  }
  if(passCnt>=2){scoreGame();return;}
  msg("你停一手，让糯糯再想想…",false);
  aiTurn();
}
function scoreGame(){
  over=true;busy=false;
  const N=B.length;let sb=0,sw=0;const seen=new Set();
  for(let c=0;c<N;c++)for(let r=0;r<N;r++){
    if(B[c][r]===1)sb++;
    else if(B[c][r]===2)sw++;
    else{
      const k=c+","+r;if(seen.has(k))continue;
      const st=[[c,r]],reg=[];const bord=new Set();seen.add(k);
      while(st.length){const[x,y]=st.pop();reg.push([x,y]);
        for(const[nx,ny]of nbrs(x,y,N)){const kk=nx+","+ny;
          if(B[nx][ny]===0){if(!seen.has(kk)){seen.add(kk);st.push([nx,ny]);}}
          else bord.add(B[nx][ny]);}}
      if(bord.size===1){if(bord.has(1))sb+=reg.length;else sw+=reg.length;}
    }
  }
  const komi=(cur.play&&cur.play.komi)||0;
  const w=sw+komi;
  const txt="数子结果：黑 "+sb+" — 白 "+w+(komi?"（含贴目 "+komi+"）":"");
  if(pvp){
    winButtons();
    msg(txt+(sb>w?"　黑棋赢啦！🏆":sb<w?"　白棋赢啦！🏆":"　平局！"),false);
    say(sb>w?"数完啦！黑棋的地盘更大，黑棋赢啦！":sb<w?"数完啦！白棋的地盘更大，白棋赢啦！":"数完啦！两边一样大，平局！");
    if(sb!==w){sWin();confetti();}
    return;
  }
  if(sb>w){win(txt+"　你围的地盘更大，你赢啦！🏆","数完啦！你围的地盘更大，你赢啦！");return;}

const ASSETDIR="assets/";

function floodKeyURL(img){
  const W=img.naturalWidth,H=img.naturalHeight,cv=document.createElement("canvas");
  cv.width=W;cv.height=H;const x=cv.getContext("2d");x.drawImage(img,0,0);
  try{const d=x.getImageData(0,0,W,H),p=d.data,seen=new Uint8Array(W*H),st=[];
    const isBg=i=>{const mn=Math.min(p[i],p[i+1],p[i+2]),mx=Math.max(p[i],p[i+1],p[i+2]);return mn>198&&mx-mn<32;};
    const push=(a,b)=>{if(a<0||b<0||a>=W||b>=H)return;const s=b*W+a;if(seen[s])return;seen[s]=1;st.push(a,b);};
    for(let a=0;a<W;a++){push(a,0);push(a,H-1);}for(let b=0;b<H;b++){push(0,b);push(W-1,b);}
    while(st.length){const b=st.pop(),a=st.pop(),i=(b*W+a)*4;if(!isBg(i))continue;p[i+3]=0;push(a+1,b);push(a-1,b);push(a,b+1);push(a,b-1);}
    x.putImageData(d,0,0);}catch(e){}
  return cv.toDataURL("image/png");
}
function loadRabbit(){const img=new Image();
  img.onload=()=>{try{$("rab").src=floodKeyURL(img);}catch(e){$("rab").src=img.src;}rabReady=true;};

const HOT=[[8,56],[67,54],[88,58],[6,80],[24,50],[50,80],[63,12],[35,63],[74,44],[50,36]];
const BOARD_CH=5;
function buildHotspots(){
  const box=$("hotspots");if(!box)return;box.innerHTML="";
  // 只有"当前目的地"是完整地图钉标签,其余全部缩成小圆点(🔒/⭐/emoji)
  let curI=CH.findIndex((ch,i)=>chapUnlocked(i)&&!ch.levels.every(l=>prog[l.key]));
  if(curI<0)curI=CH.length-1;
  const dotPos=i=>HOT[i]||[6+((i-HOT.length)%8)*12.5,7+Math.floor((i-HOT.length)/8)*8];
  CH.forEach((ch,i)=>{
    const unlocked=chapUnlocked(i),done=ch.levels.every(l=>prog[l.key]);
    const pos=dotPos(i);
    const b=document.createElement("button");
    b.style.left=pos[0]+"%";b.style.top=pos[1]+"%";
    if(i===BOARD_CH&&i!==curI){
      b.className="hot dot"+(unlocked?"":" lock");
      b.textContent=unlocked?"":"";
      b.title="大决战";
    }else if(i===curI){
      b.className="hot cur";
      b.innerHTML='<span class="pinIco"></span> '+(ch.name.split("·")[0]||"").trim();
    }else{
      b.className="hot dot"+(unlocked?"":" lock")+(done?" done":"");
      b.textContent="";
      b.title=(ch.name.split("·")[0]||"").trim();
    }
    b.onclick=ev=>{ev.stopPropagation();startAmbient();
      if(i===BOARD_CH){walkToPct(.5);setTimeout(()=>enterBoard(),650);return;}
      if(!unlocked){msgWorld("先通过前面的世界，这座冰屋才会亮哦！");return;}
      walkToPct(pos[0]/100);setTimeout(()=>enterChapter(i),650);};
    box.appendChild(b);
  });
}

/* 环境音：柔和持续低鸣 + 缓慢起伏，区别于落子音效 */
let ambNodes=null;
function startAmbient(){
  if(!soundOn||ambNodes)return;
  try{actx=actx||new(window.AudioContext||window.webkitAudioContext)();
    const master=actx.createGain();master.gain.value=0.0;master.connect(actx.destination);
    master.gain.linearRampToValueAtTime(0.06,actx.currentTime+1.5);
    const freqs=[174,261,329];const oscs=[];
    for(const fr of freqs){const o=actx.createOscillator(),g=actx.createGain();
      o.type="sine";o.frequency.value=fr;g.gain.value=0.5;o.connect(g);g.connect(master);
      const lfo=actx.createOscillator(),lg=actx.createGain();
      lfo.frequency.value=0.07+Math.random()*0.05;lg.gain.value=0.25;
      lfo.connect(lg);lg.connect(g.gain);lfo.start();o.start();oscs.push(o,lfo);}
    ambNodes={master,oscs};
  }catch(e){}
}
function stopAmbient(){
  if(!ambNodes)return;
  try{const{master,oscs}=ambNodes;master.gain.linearRampToValueAtTime(0,actx.currentTime+0.6);
    setTimeout(()=>{oscs.forEach(o=>{try{o.stop();}catch(e){}});},700);}catch(e){}
  ambNodes=null;
}
