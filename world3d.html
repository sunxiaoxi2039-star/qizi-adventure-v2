let CFG={voice:1,ambient:.18,ui:.7};
try{CFG={...CFG,...JSON.parse(localStorage.getItem('qz3_vol')||'{}')};}catch(e){}
const $=id=>document.getElementById(id);

function noiseBuf(ctx){
  const b=ctx.createBuffer(1,ctx.sampleRate*2,ctx.sampleRate),d=b.getChannelData(0);
  let last=0;
  for(let i=0;i<d.length;i++){const w=Math.random()*2-1;last=(last+.02*w)/1.02;d[i]=last*3.5;}
  return b;
}
function startAmbient(){
  if(actx)return;
  try{
    actx=new (window.AudioContext||window.webkitAudioContext)();
    ambGain=actx.createGain();ambGain.gain.value=CFG.ambient*.3;ambGain.connect(actx.destination);
    const buf=noiseBuf(actx);
    // 小溪水声(柔和)
    const water=actx.createBufferSource();water.buffer=buf;water.loop=true;water.playbackRate.value=1.6;
    const bf=actx.createBiquadFilter();bf.type='bandpass';bf.frequency.value=900;bf.Q.value=.8;
    const bg=actx.createGain();bg.gain.value=.16;
    water.connect(bf);bf.connect(bg);bg.connect(ambGain);
    const bl=actx.createOscillator(),blg=actx.createGain();
    bl.frequency.value=1.1;blg.gain.value=.06;bl.connect(blg);blg.connect(bg.gain);bl.start();
    water.start();
    // 鸟叫:随机间隔的短促啁啾
    function chirp(){
      if(!actx)return;
      const n=2+Math.floor(Math.random()*3);
      const base=2100+Math.random()*900;
      for(let i=0;i<n;i++){
        const t=actx.currentTime+i*.14+Math.random()*.03;
        const o=actx.createOscillator(),g=actx.createGain();
        o.type='sine';
        o.frequency.setValueAtTime(base+Math.random()*300,t);
        o.frequency.exponentialRampToValueAtTime(base+800+Math.random()*500,t+.06);
        o.frequency.exponentialRampToValueAtTime(base+200,t+.11);
        g.gain.setValueAtTime(.0001,t);
        g.gain.linearRampToValueAtTime(.5,t+.02);
        g.gain.exponentialRampToValueAtTime(.001,t+.12);
        o.connect(g);g.connect(ambGain);o.start(t);o.stop(t+.14);
      }
      setTimeout(chirp,2500+Math.random()*5500);
    }
    setTimeout(chirp,1200);
  }catch(e){}
}
function pop(){
  if(!actx||CFG.ui<=0)return;
  try{const o=actx.createOscillator(),g=actx.createGain();
    o.type='sine';o.frequency.value=520;
    g.gain.setValueAtTime(.0001,actx.currentTime);
    g.gain.linearRampToValueAtTime(.14*CFG.ui,actx.currentTime+.015);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.12);
    o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.14);}catch(e){}
}
let VO3=null,VO3L=null,curAudio3=null,audioUnlocked=false;
if(window.VOICE_MANIFEST&&window.VOICE_MANIFEST.lines){VO3={};VO3L={};
  Object.values(window.VOICE_MANIFEST.lines).forEach(o=>{if(o.lang==='zh'){VO3[o.text]=o.file;VO3L[o.text]=o;}});}
addEventListener('pointerdown',function unlock(){
  audioUnlocked=true;
  try{const a=new Audio();a.muted=true;a.play().catch(()=>{});}catch(e){}
  try{speechSynthesis.resume();}catch(e){}

},{once:true});
function say3(t){
  window.__lastSaid={t:t,vo:!!(VO3&&VO3[t])};

  const lang=(()=>{try{return localStorage.getItem('qz_lang')||'zh';}catch(e){return 'zh';}})();

  if(lang!=='zh'&&line&&line.tr&&line.tr[lang]){
    if(line.tr[lang].file)file=line.tr[lang].file;
    else if(line.tr[lang].text){trText=line.tr[lang].text;trLang=lang;}
  }
  if(trText){try{
    const u=new SpeechSynthesisUtterance(trText);
    u.lang=trLang==='de'?'de-DE':'en-US';u.rate=.9;u.volume=CFG.voice;

    const vs=speechSynthesis.getVoices().filter(v=>/^zh/i.test(v.lang));

}

const animBunnies=[];
const FACE={eyeY:.69,eyeZ:.43,eyeW:.38,eyeH:.17,mY:.50,mZ:.35,mW:.11,mH:.06,bY:.645,bZ:.455,bW:.28,bH:.08};
const FMAT={ready:false};
function keyCanvas(img){
  const W=img.naturalWidth,H=img.naturalHeight,cv=document.createElement('canvas');
  cv.width=W;cv.height=H;const x=cv.getContext('2d');x.drawImage(img,0,0);
  try{const d=x.getImageData(0,0,W,H),p=d.data,seen=new Uint8Array(W*H),st=[];
    const isBg=i=>{const mn=Math.min(p[i],p[i+1],p[i+2]),mx=Math.max(p[i],p[i+1],p[i+2]);return mn>210&&mx-mn<34;};
    const push=(a,b)=>{if(a<0||b<0||a>=W||b>=H)return;const q=b*W+a;if(seen[q])return;seen[q]=1;st.push(a,b);};
    for(let a=0;a<W;a++){push(a,0);push(a,H-1);}for(let b=0;b<H;b++){push(0,b);push(W-1,b);}
    while(st.length){const b=st.pop(),a=st.pop(),i=(b*W+a)*4;if(!isBg(i))continue;p[i+3]=0;push(a+1,b);push(a-1,b);push(a,b+1);push(a,b-1);}
    x.putImageData(d,0,0);}catch(e){}
  return cv;
}
function floodKeyTex(img,eyeBacking){
  const keyed=keyCanvas(img);
  let cv=keyed;
  if(eyeBacking){
    const W=keyed.width,H=keyed.height;
    cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const x=cv.getContext('2d');
    [[.31,.47],[.69,.47]].forEach(([fx,fy])=>{
      const g=x.createRadialGradient(fx*W,fy*H,W*.02,fx*W,fy*H,W*.15);
      g.addColorStop(0,'rgba(255,255,255,1)');
      g.addColorStop(.72,'rgba(255,255,255,1)');
      g.addColorStop(1,'rgba(255,255,255,0)');
      x.fillStyle=g;
      x.save();x.translate(fx*W,fy*H);x.scale(1,1.25);x.translate(-fx*W,-fy*H);
      x.beginPath();x.arc(fx*W,fy*H,W*.15,0,7);x.fill();x.restore();
    });
    x.drawImage(keyed,0,0);
  }
  const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;
}
function loadFaceMats(){
  const names=['eyes_open','eyes_closed','eyes_happy','eyes_surprised','mouth_smile','blush'];
  let done=0;
  names.forEach(n=>{
    const img=new Image();
    img.onload=()=>{FMAT[n]=new THREE.MeshBasicMaterial({map:floodKeyTex(img,n.startsWith('eyes')),transparent:true,depthWrite:false,side:THREE.DoubleSide});
      if(++done===names.length){FMAT.ready=true;animBunnies.forEach(a=>{if(a.eyes){
        a.eyes.visible=true;a.eyes.material=FMAT.eyes_open;
        if(a.blush){a.blush.visible=true;a.blush.material=FMAT.blush;}}});}};
    img.onerror=()=>{};
    img.src='assets/face/'+n+'.png';
  });
}

let playerFace={mode:null,until:0};
window.__face=(mode,ms)=>{playerFace={mode,until:performance.now()+(ms||2000)};};
let glbProto=null,glbBox=null,pendingSkins=[];
const texCache=new Map();
function deEyeTex(tex){
  if(!tex||!tex.image)return tex;
  if(texCache.has(tex))return texCache.get(tex);
  try{
    const img=tex.image,W=img.width,H=img.height;
    const cv=document.createElement('canvas');cv.width=W;cv.height=H;
    const x=cv.getContext('2d');x.drawImage(img,0,0);
    const d=x.getImageData(0,0,W,H),p=d.data;
    for(let i=0;i<p.length;i+=4){
      const lum=p[i]*.3+p[i+1]*.59+p[i+2]*.11;
      if(lum<75){p[i]=242;p[i+1]=238;p[i+2]=233;}
    }
    x.putImageData(d,0,0);
    const t=new THREE.CanvasTexture(cv);
    t.flipY=tex.flipY;t.colorSpace=THREE.SRGBColorSpace;
    t.wrapS=tex.wrapS;t.wrapT=tex.wrapT;t.needsUpdate=true;
    texCache.set(tex,t);return t;
  }catch(e){return tex;}
}
function furify(root){
  root.traverse(o=>{
    if(o.isMesh&&o.material){
      const old=o.material;
      const cleaned=old.map; // 贴纸脸方案已弃用:保留模型原生画脸(STICKER=false)
      o.material=new THREE.MeshPhysicalMaterial({
        map:cleaned,color:new THREE.Color(0xffffff),
        emissive:new THREE.Color(0xffffff),emissiveMap:cleaned,emissiveIntensity:.38,
        roughness:.9,sheen:1,sheenRoughness:.55,sheenColor:new THREE.Color(0xFFF6EE)});
      o.castShadow=true;
    }
  });
}
function fallbackBunny(H){
  const g=new THREE.Group(),M=CE;
  const body=new THREE.Mesh(new THREE.SphereGeometry(H*.24,24,18),M);
  body.scale.set(1,1.18,.92);body.position.y=H*.29;g.add(body);
  const head=new THREE.Mesh(new THREE.SphereGeometry(H*.185,24,18),M);
  head.position.set(0,H*.62,H*.01);g.add(head);
  const eG=new THREE.CapsuleGeometry(H*.05,H*.24,6,10);
  const e1=new THREE.Mesh(eG,M);e1.position.set(-H*.085,H*.92,0);e1.rotation.z=.12;g.add(e1);
  const e2=new THREE.Mesh(eG,M);e2.position.set(H*.085,H*.92,0);e2.rotation.z=-.12;g.add(e2);
  const iG=new THREE.CapsuleGeometry(H*.022,H*.15,6,8);
  const i1=new THREE.Mesh(iG,SOFTPINK);i1.position.set(-H*.085,H*.925,H*.03);i1.rotation.z=.12;g.add(i1);
  const i2=new THREE.Mesh(iG,SOFTPINK);i2.position.set(H*.085,H*.925,H*.03);i2.rotation.z=-.12;g.add(i2);

function boardTexture(){

  const n=9,m=70,st=(S-2*m)/(n-1);

    x.beginPath();x.moveTo(m+i*st,m);x.lineTo(m+i*st,S-m);x.stroke();}

}

const pn=(i,j)=>[[i-1,j],[i+1,j],[i,j-1],[i,j+1]].filter(([a,b])=>a>=0&&b>=0&&a<GN&&b<GN);
function pGrp(g,i,j){
  const c=g[i][j],seen=new Set([i+","+j]),libs=new Set(),st=[[i,j]],out=[];
  while(st.length){const[a,b]=st.pop();out.push([a,b]);
    for(const[x,y]of pn(a,b)){const k=x+","+y;
      if(g[x][y]===0)libs.add(k);
      else if(g[x][y]===c&&!seen.has(k)){seen.add(k);st.push([x,y]);}}}
  return{stones:out,libs};
}
function pTry(g,i,j,c){
  if(g[i][j]!==0)return{ok:false};
  const g2=g.map(r=>r.slice());g2[i][j]=c;const cap=[];
  for(const[x,y]of pn(i,j))if(g2[x][y]===3-c){
    const gr=pGrp(g2,x,y);
    if(gr.libs.size===0)for(const[a,b]of gr.stones){if(g2[a][b]!==0){g2[a][b]=0;cap.push([a,b]);}}}
  if(pGrp(g2,i,j).libs.size===0)return{ok:false,suicide:true};
  return{ok:true,g2,cap};
}
function pGroups(g,c){const seen=new Set(),out=[];
  for(let i=0;i<GN;i++)for(let j=0;j<GN;j++)
    if(g[i][j]===c&&!seen.has(i+","+j)){const gr=pGrp(g,i,j);
      gr.stones.forEach(([a,b])=>seen.add(a+","+b));out.push(gr);}
  return out;}
function pAI(g){
  const legal=[];
  for(let i=0;i<GN;i++)for(let j=0;j<GN;j++){const t=pTry(g,i,j,2);if(t.ok)legal.push({i,j,t});}
  if(!legal.length)return null;
  const caps=legal.filter(m=>m.t.cap.length>0);
  if(caps.length&&Math.random()<.55)return caps[0];
  for(const gr of pGroups(g,2))if(gr.libs.size===1){
    const[a,b]=[...gr.libs][0].split(",").map(Number);
    const t=pTry(g,a,b,2);
    if(t.ok&&pGrp(t.g2,a,b).libs.size>=2)return{i:a,j:b,t};}
  const at=legal.filter(m=>pGrp(m.t.g2,m.i,m.j).libs.size>=2&&pGroups(m.t.g2,1).some(x=>x.libs.size===1));
  if(at.length&&Math.random()<.25)return at[Math.floor(Math.random()*at.length)];
  let best=null,bs=-99;
  for(const m of legal){
    const my=pGrp(m.t.g2,m.i,m.j).libs.size;if(my<2&&legal.length>4)continue;
    let adjB=0;for(const[x,y]of pn(m.i,m.j))if(g[x][y]===1)adjB++;
    const ctr=-(Math.abs(m.i-4)+Math.abs(m.j-4))*.3;
    const sc=my*.7+adjB+ctr+Math.random()*2;
    if(sc>bs){bs=sc;best=m;}}
  return best||legal[0];
}

let t0=performance.now(),walkT=0,miniT=0;

function step(now){
  const dt=Math.min(.05,(now-t0)/1000);t0=now;
  const tS=now/1000;
  let keyMove=false;
  if(!playMode){
    if(keys.ArrowLeft||keys.a||keys.A)camYaw+=1.9*dt;
    if(keys.ArrowRight||keys.d||keys.D)camYaw-=1.9*dt;
    let fw=0;
    if(keys.ArrowUp||keys.w||keys.W)fw=1;
    else if(keys.ArrowDown||keys.s||keys.S)fw=-.7;
    if(fw){
      keyMove=true;moving=false;
      const dx=-Math.sin(camYaw)*fw,dz=-Math.cos(camYaw)*fw;
      player.position.x+=dx*6*dt;player.position.z+=dz*6*dt;
      player.rotation.y=THREE.MathUtils.lerp(player.rotation.y,Math.atan2(dx,dz),.2);
      walkT+=dt*11;player.position.y=Math.abs(Math.sin(walkT))*.14;

  if(moving&&!keyMove){
    const dir=new THREE.Vector3().subVectors(target,player.position);dir.y=0;
    const d=dir.length();
    if(d<.15)moving=false;

      player.rotation.y=THREE.MathUtils.lerp(player.rotation.y,Math.atan2(dir.x,dir.z),.15);
      walkT+=dt*11;
      player.position.y=Math.abs(Math.sin(walkT))*.14;
    }

  if(!playMode)collide();

  if(!playMode&&(keyMove||moving)){
    const moved=Math.hypot(player.position.x-stuckPX,player.position.z-stuckPZ);
    if(moved<2.2*dt){stuckMs+=dt*1000;}else stuckMs=0;
    if(stuckMs>1200){camDist=Math.min(15,camDist+6);stuckMs=-3500;}
  }else stuckMs=0;
  stuckPX=player.position.x;stuckPZ=player.position.z;

  if(playMode){want=new THREE.Vector3(0,15.5,-4);look=new THREE.Vector3(0,.7,-17);}

    look=new THREE.Vector3(player.position.x,p.ly,player.position.z);
  }else{
    want=new THREE.Vector3(player.position.x+Math.sin(camYaw)*camDist,hh,player.position.z+Math.cos(camYaw)*camDist);
    look=new THREE.Vector3(player.position.x-Math.sin(camYaw)*14,1.8,player.position.z-Math.cos(camYaw)*14);

  });
  const bd=document.createElement('span');bd.className='mdot done';bd.style.background='#C89A5B';
  const[bx,by]=mapXY(0,-16);bd.style.left=bx+'%';bd.style.top=by+'%';m.appendChild(bd);
  $('mnext').textContent=nextName?('下一站 · '+nextName):'全部通关！去见兔祖师🐰';
}
buildMini();
$('mini').onclick=()=>{resetHome();say3("回到出发点啦！");};
function updMini(){
  const r=$('mrab');if(!r)return;
  const[mx,my]=mapXY(player.position.x,player.position.z);
  r.style.left=Math.max(4,Math.min(96,mx))+'%';r.style.top=Math.max(4,Math.min(96,my))+'%';
}

let greeted=false;
addEventListener('pointerdown',()=>{
  if(greeted)return;greeted=true;
  const st=STATIONS[currentIdx];
  say3("欢迎来到棋境！去找戴金圈的小屋，小兔子老师在等你！");
});

window.__faceTune=o=>{Object.assign(FACE,o);
  animBunnies.forEach(a=>{if(!a.eyes)return;const H=a.H;
    a.eyes.position.set(0,FACE.eyeY*H,FACE.eyeZ*H);
    a.eyes.geometry.dispose();a.eyes.geometry=new THREE.PlaneGeometry(FACE.eyeW*H,FACE.eyeH*H);
    if(a.base){a.base.position.set(0,FACE.eyeY*H,(FACE.eyeZ-.012)*H);
      a.base.geometry.dispose();a.base.geometry=new THREE.PlaneGeometry(FACE.eyeW*1.3*H,FACE.eyeH*1.9*H);}
    a.blush.position.set(0,FACE.bY*H,FACE.bZ*H);
    a.blush.geometry.dispose();a.blush.geometry=new THREE.PlaneGeometry(FACE.bW*H,FACE.bH*H);
  });return FACE;};
window.__faceDbg=()=>{const a=animBunnies[0]||{};return{ready:FMAT.ready,
  loaded:Object.keys(FMAT).filter(k=>k!=='ready'),
  hasEyes:!!a.eyes,eyesVisible:a.eyes&&a.eyes.visible,
  matNow:a.eyes?(a.eyes.material===FMAT.eyes_closed?'closed':a.eyes.material===FMAT.eyes_open?'open':'other'):null,
  blinkEnd:a.blinkEnd,t0Now:t0,inWindow:a.blinkEnd>t0};};
window.__setInnerRot=v=>{animBunnies.forEach(a=>{if(a.inner)a.inner.rotation.y=v;});};
window.__anim=()=>animBunnies.map((a,i)=>{
  const me=a.wrap.matrixWorld.elements;
  const ee=a.eyes?a.eyes.matrixWorld.elements:null;
  return{i,H:a.H,wrapPos:[me[12],me[13],me[14]].map(v=>+v.toFixed(2)),
    wrapZ:[me[8],me[10]].map(v=>+v.toFixed(2)),
    eyesPos:ee?[ee[12],ee[13],ee[14]].map(v=>+v.toFixed(2)):null,
    eyesZ:ee?[ee[8],ee[10]].map(v=>+v.toFixed(2)):null};
});
window.__w3_setyaw=v=>{camYaw=v;};
window.__w3={pos:()=>player.position.toArray(),go:(x,z)=>{target.set(x,0,z);moving=true;},
  tp:(x,z)=>{player.position.set(x,0,z);target.set(x,0,z);moving=false;
    camPos.set(x+Math.sin(camYaw)*camDist,2.4+camDist*.3,z+Math.cos(camYaw)*camDist);step(performance.now()+1);},
  zone:()=>curZone,zoom:v=>{camDist=Math.min(15,Math.max(5.5,v));},
  blink:()=>{const n=Math.max(performance.now(),t0);animBunnies.forEach(a=>{a.blinkEnd=n+60000;a.nextBlink=n+9e9;});step(t0+16);},
  startPlay:()=>window.__startPlay(),exitPlay:()=>window.__exitPlay(),
  clickGrid:(i,j)=>pClickGrid(i,j),stepNow:(ms)=>step(t0+(ms||16)),
  bunnies:()=>animBunnies.length,home:()=>resetHome(),
  pstate:()=>({playMode,pOver,pBusy,board:pg?pg.map(r=>r.join("")).join("|"):null,panel:zoneEl.textContent.replace(/\s+/g,' ').slice(0,80)})};
</script>
