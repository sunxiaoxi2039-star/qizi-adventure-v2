<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>棋境 · 白瓷兔子世界</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",sans-serif;user-select:none;}
  #app{position:fixed;inset:0;touch-action:none;} /* 锁死浏览器手势,双指捏合才能进 3D */
  #app canvas{touch-action:none;}
  canvas{display:block;}
  @media(max-width:560px){
    #hint{top:auto!important;bottom:126px;font-size:11px;max-width:72vw;white-space:normal;text-align:center;line-height:1.5;}
    #hud{font-size:12px;padding:6px 10px;}
    #back{font-size:13px;padding:8px 12px;}
  }
  #hint{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.82);
    color:#4a5a6a;font-size:14px;font-weight:600;padding:8px 18px;border-radius:999px;box-shadow:0 2px 10px rgba(0,0,0,.08);white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;}
  #zone button{background-color:#77B77A!important;background-image:url("assets/ui/final/capsule_green.png?v=1")!important;
    background-size:100% 100%!important;background-repeat:no-repeat!important;border:none!important;
    color:#fff;text-shadow:0 1px 2px rgba(60,90,60,.35);font-weight:800;border-radius:999px;
    padding:10px 20px;margin-top:6px;cursor:pointer;}
  #zone button[style*="F2C76E"],#zone button[style*="bba98c"],#zone button[style*="E8924A"]{
    background-image:url("assets/ui/final/capsule_gold.png?v=1")!important;background-color:#F2C76E!important;
    color:#7a5a16!important;text-shadow:none;}
  #zone{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:rgba(255,255,255,.94);
    border-radius:18px;padding:12px 20px;font-size:15px;color:#3a4a5a;box-shadow:0 4px 18px rgba(0,0,0,.12);
    display:none;text-align:center;max-width:86vw;line-height:1.6;}
  #zone b{color:#B5651D;font-size:17px;}
  #zone.play{bottom:auto;top:60px;padding:8px 16px;font-size:14px;}
  #zone button{margin-top:8px;border:none;background:#5B8DD9;color:#fff;font-size:15px;font-weight:700;
    padding:8px 18px;border-radius:12px;cursor:pointer;}
  .popPetal{position:fixed;width:12px;height:9px;border-radius:60% 40% 55% 45%;
    background:radial-gradient(ellipse at 35% 35%,#FFE9C9 0%,#F2C76E 60%,#D9A94E 100%);
    pointer-events:none;z-index:80;animation:ppf .85s ease-out forwards;}
  @keyframes ppf{to{transform:translate(var(--dx),var(--dy)) rotate(240deg);opacity:0;}}
  #back{position:fixed;left:14px;top:14px;border:none;background-color:#FBF9F4;color:#7a5a2a;
    background-image:url("assets/ui/final/pill_cloud.png?v=1");background-size:100% 100%;background-repeat:no-repeat;
    font-size:14px;font-weight:800;padding:10px 18px;border-radius:999px;cursor:pointer;
    box-shadow:0 3px 8px rgba(120,80,20,.12);}
  #hud{position:fixed;right:14px;top:14px;background-color:#FBF9F4;color:#a9772a;font-size:14px;font-weight:800;
    background-image:url("assets/ui/final/pill_cloud.png?v=1");background-size:100% 100%;background-repeat:no-repeat;
    padding:10px 16px;border-radius:999px;box-shadow:0 3px 8px rgba(120,80,20,.12);
    display:flex;align-items:center;gap:5px;}
  #hud::before{content:"";width:18px;height:18px;flex:none;
    background:url("assets/ui/final/star_gold.png?v=1") center/contain no-repeat;}
  #volBtn{position:fixed;right:14px;top:60px;border:none;width:42px;height:42px;font-size:0;
    background:url("assets/ui/final/hud_sound.png?v=1") center/contain no-repeat;
    cursor:pointer;filter:drop-shadow(0 2px 3px rgba(120,80,20,.14));padding:0;}
  #vol{position:fixed;right:14px;top:98px;background:rgba(255,255,255,.94);border-radius:16px;padding:12px 14px;
    box-shadow:0 4px 18px rgba(0,0,0,.12);display:none;font-size:13px;color:#4a5a6a;}
  #vol label{display:flex;align-items:center;gap:8px;margin:6px 0;}
  #vol input{width:110px;}
  #mini{position:fixed;left:14px;bottom:14px;width:150px;height:96px;background:rgba(255,255,255,.78);
    border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.10);backdrop-filter:blur(4px);cursor:pointer;}
  .mdot{position:absolute;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);
    cursor:pointer;box-shadow:0 1px 3px rgba(120,90,40,.25);}
  .mdot::after{content:"";position:absolute;inset:-8px;border-radius:50%;} /* 手机手指热区 */
  .mdot.done{background:#7CC08F;}
  .mdot.next{background:#F5B942;box-shadow:0 0 0 3px rgba(245,185,66,.3);animation:pp 1.6s infinite;}
  .mdot.lock{background:#D9D6CF;}
  @keyframes pp{50%{box-shadow:0 0 0 6px rgba(245,185,66,.15);}}
  #mrab{position:absolute;width:9px;height:9px;border-radius:50%;background:#F06FA8;border:2px solid #fff;transform:translate(-50%,-50%);}
  #mnext{position:fixed;left:14px;bottom:116px;background:rgba(255,255,255,.82);color:#7a5a2a;
    font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
  #loader{position:fixed;inset:0;background:#FBF7F0;z-index:99;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:18px;transition:opacity .5s;}
  #loader.off{opacity:0;pointer-events:none;}
  .lb{position:relative;width:90px;height:110px;}
  .lb .head{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:78px;height:72px;background:#fff;border-radius:50%;box-shadow:0 4px 14px rgba(180,150,120,.25);}
  .lb .ear{position:absolute;bottom:58px;width:20px;height:52px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(180,150,120,.2);}
  .lb .ear.l{left:16px;transform:rotate(-8deg);animation:earw 3s ease-in-out infinite;}
  .lb .ear.r{right:16px;transform:rotate(8deg);animation:earw 3s ease-in-out infinite reverse;}
  .lb .ear::after{content:"";position:absolute;inset:8px 5px 6px;background:#F9CFDC;border-radius:8px;}
  .lb .eye{position:absolute;bottom:34px;width:9px;height:12px;background:#3a3a40;border-radius:50%;animation:blink 3.2s infinite;}
  .lb .eye.l{left:24px;} .lb .eye.r{right:24px;}
  .lb .cheek{position:absolute;bottom:24px;width:12px;height:8px;background:#F9CFDC;border-radius:50%;}
  .lb .cheek.l{left:14px;} .lb .cheek.r{right:14px;}
  @keyframes blink{0%,92%,100%{transform:scaleY(1);}95%{transform:scaleY(.08);}}
  @keyframes earw{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(-2deg);}}
  #loader p{color:#a98a52;font-size:15px;font-weight:600;}
</style>
</head>
<body>
<div id="app"></div>
<div id="loader"><div class="lb"><span class="ear l"></span><span class="ear r"></span><span class="head"></span><span class="eye l"></span><span class="eye r"></span><span class="cheek l"></span><span class="cheek r"></span></div><p>糯糯正在铺雪毯…</p></div>
<div id="hint">↑↓←→ 走路 · 拖动看风景 · 滚轮放大缩小</div>
<div id="fileWarn" style="display:none;position:fixed;top:52px;left:50%;transform:translateX(-50%);
  background:#FFF3D6;color:#9a6b1a;font-size:13px;font-weight:700;padding:8px 16px;border-radius:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.12);z-index:60;">⚠️ 当前是简化画面 — 请关掉本页，改为双击文件夹里的「启动.command」获得完整 3D 世界</div>
<script>if(location.protocol==='file:')document.addEventListener('DOMContentLoaded',()=>{document.getElementById('fileWarn').style.display='block';});</script>
<div id="zone"></div>
<button id="back" onclick="window.__openCourse?__openCourse():location.href='index.html'">📖 课程</button>
<div id="hud"></div>
<button id="volBtn">🔊</button>
<div id="vol">
  <label>🗣️ 老师 <input type="range" id="vVoice" min="0" max="100" value="100"></label>
  <label>🌬️ 自然 <input type="range" id="vAmb" min="0" max="100" value="40"></label>
  <label>🔔 音效 <input type="range" id="vUi" min="0" max="100" value="70"></label>
  <label>🌍 语言 <select id="vLang"><option value="zh">中文</option><option value="en">English</option><option value="de">Deutsch</option></select></label>
</div>
<div id="mini" title="点我回到出发点"></div><div id="mnext"></div>

<style>

  #qzApp, #qzApp *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    --pink:#F5AFC1; --sky:#9DCAE8; --ink:#2D2B28; --line:#EADFC8; }
  #qzApp{
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
    background:

      radial-gradient(80% 50% at 85% 0%, #FDF6E6 0%, rgba(253,246,230,0) 55%),

  #qzApp main { width:100%; max-width:540px; flex:1; display:flex; flex-direction:column; align-items:center; padding:0 12px 24px; }
  .screen { width:100%; display:none; flex-direction:column; align-items:center; }
  .screen.on { display:flex; }
  #pathbar { width:100%; display:flex; align-items:center; gap:6px; padding:10px 14px; background:var(--porc);

    box-shadow:0 2px 0 #EFE4CC; }
  .pdot { min-width:12px; height:12px; border-radius:50%; background:#EDE5D4; cursor:pointer; border:1px solid #E0D5BE; }

  .pline { flex:1; height:3px; min-width:8px; background:#EFEAE0; border-radius:2px; }

  #pathlabel { font-size:13px; color:#a98a52; white-space:nowrap; font-weight:700; margin-left:4px; }
  #rankbar { width:100%; background:#fff; border-radius:14px; padding:9px 12px 7px; margin:6px 0 4px; }
  .rkline { display:flex; align-items:center; gap:4px; }
  .rk { font-size:11px; font-weight:700; color:#B5651D; white-space:nowrap; }

    cursor:pointer; font-family:inherit; }
  .chip:active { transform:scale(.95); }
  .chip.lock { background:#F4EFE6; color:#b0a48d; }
  .chip.done { background:#F1F8EE; }
  .chip.cur { box-shadow:0 0 0 3px rgba(245,185,66,.35); }
  .rankb { font-size:10px; font-weight:700; background:#FFF1C9; color:#a9772a; border-radius:999px;

  #rankNote { width:100%; text-align:center; font-size:11px; color:#b3a184; margin:8px 0 2px; line-height:1.6; }

  @keyframes pinbob { 50% { transform:translateY(-5px); } }
  #mapToast { position:fixed; left:50%; bottom:64px; transform:translateX(-50%); max-width:86vw;

    color:#fff; box-shadow:0 3px 0 rgba(0,0,0,.15);

  .node .ic { font-size:24px; }

  #bubble {
    width:100%; background:var(--porc); border:1.5px solid var(--line); border-radius:22px;
    padding:11px 14px; font-size:18px; line-height:1.55; margin:4px 0 12px;
    display:flex; gap:12px; align-items:center; min-height:64px;
    box-shadow:inset 0 0 0 4px var(--cream), 0 3px 0 #EFE4CC, 0 8px 18px rgba(120,80,20,.08);
  }

    border-radius:50%; box-shadow:0 2px 0 #E6D2AE; }
  #qzApp canvas { display:block; border:9px solid var(--wood); border-radius:20px; cursor:pointer;

    background:#E8C88F; }
  #game { background:var(--porc); border:1.5px solid var(--line); border-radius:26px;

    box-shadow:inset 0 0 0 5px var(--cream), 0 4px 0 #EFE4CC, 0 16px 34px rgba(120,80,20,.10); }
  .btnrow { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; justify-content:center; }
  .big { border:2px solid rgba(255,255,255,.55); border-radius:999px; font-size:17px; font-weight:700;
    padding:11px 24px; cursor:pointer; color:#fff; background:var(--sage); letter-spacing:2px;
    box-shadow:0 3px 0 var(--sage-d), 0 8px 16px rgba(94,158,98,.25); }
  .big.alt, .big.gray, .big.blue { background:var(--porc); color:#8a6a3a;

    box-shadow:0 3px 0 #EFE4CC, 0 6px 12px rgba(120,80,20,.08); letter-spacing:1px; }
  .big.alt { border-color:var(--gold); color:#a9772a; }
  .big.goldbtn { background:var(--gold); color:#7a5a16; border:2px solid rgba(255,255,255,.6);
    box-shadow:0 3px 0 var(--gold-d), 0 8px 16px rgba(217,169,78,.3); }
  .big:active { transform:scale(.95); }
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; padding:16px; z-index:50; }
  #modal.on { display:flex; }
  #modal .box { background:var(--porc); border:1.5px solid var(--line); border-radius:24px; max-width:460px; width:100%; max-height:84vh; overflow:auto; padding:20px; font-size:15px; line-height:1.7;
    box-shadow:inset 0 0 0 5px var(--cream), 0 18px 40px rgba(60,40,10,.25); }
  #modal h3 { color:#B5651D; margin:10px 0 6px; }
  #modal a { color:#2a7ae2; word-break:break-all; }
  .task { display:flex; align-items:center; gap:8px; background:#FFF7E8; border-radius:12px; padding:8px 12px; margin:6px 0; }
  .task input { width:20px; height:20px; }
  .res { background:#F4F9F1; border-radius:12px; padding:8px 12px; margin:6px 0; }
  .res .lt { color:#999; font-size:13px; }
  .gloss { background:#FFF1C9; border-radius:12px; padding:8px 12px; margin:6px 0; font-size:14px; }
  .confetti { position:fixed; top:-40px; font-size:28px; z-index:99; animation:fall 1.4s ease-in forwards; pointer-events:none; }
  @keyframes fall { to { transform:translateY(105vh) rotate(360deg); opacity:.2; } }
  .petal { position:fixed; top:-30px; z-index:99; pointer-events:none;
    width:14px; height:10px; border-radius:60% 40% 55% 45%;
    background:radial-gradient(ellipse at 35% 35%, #FFE3EC 0%, #FFB7CE 55%, #F797B8 100%);
    box-shadow:0 0 3px rgba(255,182,206,.5);
    animation:petalFall linear forwards; }

  #langBtn { background-image:url("assets/ui/final/hud_lang.png?v=1"); padding-top:3px; }

  .qzSeam { position:absolute; left:0; right:0; top:-34px; height:68px; pointer-events:none; z-index:2;
    background:

    const push=(a,b)=>{if(a<0||b<0||a>=W||b>=H)return;const q=b*W+a;if(seen[q])return;seen[q]=1;st.push(a,b);};
    for(let a=0;a<W;a++){push(a,0);push(a,H-1);}for(let b=0;b<H;b++){push(0,b);push(W-1,b);}

const pn=(i,j)=>[[i-1,j],[i+1,j],[i,j-1],[i,j+1]].filter(([a,b])=>a>=0&&b>=0&&a<GN&&b<GN);
function pGrp(g,i,j){
  const c=g[i][j],seen=new Set([i+","+j]),libs=new Set(),st=[[i,j]],out=[];
  while(st.length){const[a,b]=st.pop();out.push([a,b]);
    for(const[x,y]of pn(a,b)){const k=x+","+y;
      if(g[x][y]===0)libs.add(k);
      else if(g[x][y]===c&&!seen.has(k)){seen.add(k);st.push([x,y]);}}}
  return{stones:out,libs};
}
function pTry(g,i,j,c){
  if(g[i][j]!==0)return{ok:false};
  const g2=g.map(r=>r.slice());g2[i][j]=c;const cap=[];
  for(const[x,y]of pn(i,j))if(g2[x][y]===3-c){
    const gr=pGrp(g2,x,y);
    if(gr.libs.size===0)for(const[a,b]of gr.stones){if(g2[a][b]!==0){g2[a][b]=0;cap.push([a,b]);}}}
  if(pGrp(g2,i,j).libs.size===0)return{ok:false,suicide:true};
  return{ok:true,g2,cap};
}
function pGroups(g,c){const seen=new Set(),out=[];
  for(let i=0;i<GN;i++)for(let j=0;j<GN;j++)
    if(g[i][j]===c&&!seen.has(i+","+j)){const gr=pGrp(g,i,j);
      gr.stones.forEach(([a,b])=>seen.add(a+","+b));out.push(gr);}
  return out;}
function pAI(g){
  const legal=[];
  for(let i=0;i<GN;i++)for(let j=0;j<GN;j++){const t=pTry(g,i,j,2);if(t.ok)legal.push({i,j,t});}
  if(!legal.length)return null;
  const caps=legal.filter(m=>m.t.cap.length>0);
  if(caps.length&&Math.random()<.55)return caps[0];
  for(const gr of pGroups(g,2))if(gr.libs.size===1){
    const[a,b]=[...gr.libs][0].split(",").map(Number);
    const t=pTry(g,a,b,2);
    if(t.ok&&pGrp(t.g2,a,b).libs.size>=2)return{i:a,j:b,t};}
  const at=legal.filter(m=>pGrp(m.t.g2,m.i,m.j).libs.size>=2&&pGroups(m.t.g2,1).some(x=>x.libs.size===1));
  if(at.length&&Math.random()<.25)return at[Math.floor(Math.random()*at.length)];
  let best=null,bs=-99;
  for(const m of legal){
    const my=pGrp(m.t.g2,m.i,m.j).libs.size;if(my<2&&legal.length>4)continue;
    let adjB=0;for(const[x,y]of pn(m.i,m.j))if(g[x][y]===1)adjB++;
    const ctr=-(Math.abs(m.i-4)+Math.abs(m.j-4))*.3;
    const sc=my*.7+adjB+ctr+Math.random()*2;
    if(sc>bs){bs=sc;best=m;}}
  return best||legal[0];
}

  }
  const lampSpots=[],treeSpots=[],hutSpots=[];
  hutTs.forEach((t,i)=>{
    const p=curve.getPointAt(t),side=i%2?1:-1,off=lat(t).multiplyScalar(side*3.1);
    const hx=p.x+off.x,hz=p.z+off.z;
    const dc=new THREE.Vector3(p.x-hx,0,p.z-hz).normalize();
    hutSpots.push([hx,hz,Math.atan2(dc.x,dc.z),i]);
    const ns=numSprite(i+1);ns.position.set(hx,3.3,hz);scene.add(ns);
    COLLIDERS.push({x:hx,z:hz,r:1.9});
    const back=lat(t).multiplyScalar(-side*3.5);
    if(i%2===0)lampSpots.push([p.x+back.x,p.z+back.z]);
    else if(i%4===1)treeSpots.push([p.x+back.x,p.z+back.z,3.1+rnd()*.8]);
  });
  /* 关卡小屋=村里同款白瓷雪屋,五色轻染,门朝大路 */
  loadProp('yurt',()=>{hutSpots.forEach(([x,z,ang,i])=>{
    let h=propInstance('yurt',2.7);
    if(!h)return;
    h=tintClone(h,STATION_TINT[i%STATION_TINT.length],.16);
    h.position.set(x,0,z);h.rotation.y=ang;
    h.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
    scene.add(h);});});
  loadProp('lantern',()=>{lampSpots.forEach(([x,z])=>{
    const ln=propInstance('lantern',1.7);if(!ln)return;
    ln.position.set(x,0,z);scene.add(ln);COLLIDERS.push({x,z,r:.55});});});
  loadProp('tree',()=>{treeSpots.forEach(([x,z,h])=>{
    const tr=propInstance('tree',h);if(!tr)return;
    tr.position.set(x,0,z);scene.add(tr);COLLIDERS.push({x,z,r:.8});});});
  /* 路旁悬浮小岛(共用呼吸动画) */
  (B.isles||[]).forEach(([x,y,z,s])=>floatIsle(x,y,z,s));
  DUNE_E.position.set(88,0,-46); // 东雪包南移:让开大道视野,仍填南侧远景
  /* ?go=board 评审直达:出生即站在大道起点面朝天空城(防开场动画抢位,1.2s 再钉一次) */
  if(/[?&]go=board/.test(location.search)){
    const goStart=()=>{player.position.set(46,0,4);target.copy(player.position);camYaw=-1.85;};
    goStart();setTimeout(goStart,1200);
  }
  console.log('[board] causeway L≈'+Math.round(L),'huts',hutN);
}
COLLIDERS.push({x:0,z:-64,r:15});           // 圣殿雕像基座
COLLIDERS.push({x:8,z:10,r:.8});            // 熊猫村民
COLLIDERS.push({x:-30,z:-18,r:.8});
COLLIDERS.push({x:26,z:-26,r:.8});
SNOWSTONES.forEach(([x,z])=>COLLIDERS.push({x,z,r:1.25}));
[[-38,-74,2.6],[34,-80,3],[46,-60,2],[-30,-42,2.2],[30,-46,2.4],[-16,-44,1.8],[18,-48,1.7]]
  .forEach(([x,z,r])=>COLLIDERS.push({x,z,r}));
function resetHome(){player.position.set(0,0,18);target.copy(player.position);moving=false;camYaw=1.26;}
window.__resetHome=resetHome;
function collide(){
  for(let it=0;it<2;it++)
  for(const c of COLLIDERS){
    const dx=player.position.x-c.x,dz=player.position.z-c.z;
    const d=Math.hypot(dx,dz),min=c.r+.5;
    if(d<min){
      if(d<1e-4){player.position.x=c.x+min;continue;}
      const f=min/d;
      player.position.x=c.x+dx*f;player.position.z=c.z+dz*f;
      if(!window.__lastBump||performance.now()-window.__lastBump>3000){window.__lastBump=performance.now();window.__face&&__face('surprised',700);}
      if(moving&&Math.hypot(target.x-player.position.x,target.z-player.position.z)<1.4)moving=false;
    }
  }
  /* 复合栓绳:主岛 r76;云上分区各 r25(以最近分区计);?board 旗开时云堤走廊放行 */
  const dd=Math.hypot(player.position.x,player.position.z);
  if(dd>76){
    let zc=null,zd=1e9;
    for(const c of ZONE_CENTERS){const d=Math.hypot(player.position.x-c[0],player.position.z-c[1]);if(d<zd){zd=d;zc=c;}}
    let bd=1e9,bp=null;
    if(BOARD_PTS){const bn=boardNear(player.position.x,player.position.z);bd=bn.d;bp=bn.p;}
    if(zc&&zd<=25){/* 在分区活动圈内 */}
    else if(bd<=BOARD_W){/* 云堤走廊上 */}
    else if(bd<=BOARD_W+6){const f=BOARD_W/bd;
      player.position.x=bp.x+(player.position.x-bp.x)*f;player.position.z=bp.z+(player.position.z-bp.z)*f;}
    else if(zc&&zd<=48){const f=25/zd;
      player.position.x=zc[0]+(player.position.x-zc[0])*f;player.position.z=zc[1]+(player.position.z-zc[1])*f;}
    else{player.position.x*=76/dd;player.position.z*=76/dd;}
  }
  if(!isFinite(player.position.x)||!isFinite(player.position.z))resetHome();
}

let t0=performance.now(),walkT=0,miniT=0;
let stuckMs=0,stuckPX=0,stuckPZ=0;
const camPos=new THREE.Vector3(0,5,30);
function step(now){
  const dt=Math.min(.05,(now-t0)/1000);t0=now;
  const tS=now/1000;
  let keyMove=false;
  if(!playMode){
    if(keys.ArrowLeft||keys.a||keys.A)camYaw+=1.9*dt;
    if(keys.ArrowRight||keys.d||keys.D)camYaw-=1.9*dt;
    let fw=0;
    if(keys.ArrowUp||keys.w||keys.W)fw=1;
    else if(keys.ArrowDown||keys.s||keys.S)fw=-.7;
    if(fw){
      keyMove=true;moving=false;
      const dx=-Math.sin(camYaw)*fw,dz=-Math.cos(camYaw)*fw;
      player.position.x+=dx*6*dt;player.position.z+=dz*6*dt;
      player.rotation.y=THREE.MathUtils.lerp(player.rotation.y,Math.atan2(dx,dz),.2);
      walkT+=dt*11;if(!heroEntry||!heroEntry.mixer)player.position.y=Math.abs(Math.sin(walkT))*.14;
    }
  }
  if(moving&&!keyMove){
    const dir=new THREE.Vector3().subVectors(target,player.position);dir.y=0;
    const d=dir.length();
    if(d<.15)moving=false;
    else{
      dir.normalize();
      player.position.addScaledVector(dir,Math.min(d,6.2*dt));
      player.rotation.y=THREE.MathUtils.lerp(player.rotation.y,Math.atan2(dir.x,dir.z),.15);
      walkT+=dt*11;
      if(!heroEntry||!heroEntry.mixer)player.position.y=Math.abs(Math.sin(walkT))*.14;
    }
  } else if(!keyMove)player.position.y*=.85;
  if(!playMode)collide();
  // 卡死检测:想走却走不动 1.2 秒 → 镜头自动拉远,帮兔子重新找方向
  if(!playMode&&(keyMove||moving)){
    const moved=Math.hypot(player.position.x-stuckPX,player.position.z-stuckPZ);
    if(moved<2.2*dt){stuckMs+=dt*1000;}else stuckMs=0;
    if(stuckMs>1200){camDist=Math.min(15,camDist+6);stuckMs=-3500;}
  }else stuckMs=0;
  stuckPX=player.position.x;stuckPZ=player.position.z;
  const hh=2.4+camDist*.30+Math.max(0,camDist-15)*.55;
  let want,look;
  if(playMode){want=new THREE.Vector3(0,15.5,-4);look=new THREE.Vector3(0,.7,-17);}
  else if(window.__photo){
    const p=window.__photo;
    want=new THREE.Vector3(player.position.x+Math.sin(camYaw)*p.d,p.h,player.position.z+Math.cos(camYaw)*p.d);
    look=new THREE.Vector3(player.position.x,p.ly,player.position.z);
  }else{
    want=new THREE.Vector3(player.position.x+Math.sin(camYaw)*camDist,hh,player.position.z+Math.cos(camYaw)*camDist);
    look=new THREE.Vector3(player.position.x-Math.sin(camYaw)*14,1.8,player.position.z-Math.cos(camYaw)*14);
    /* 防穿屋檐:玩家头顶→相机连线撞进建筑体,就把吊臂截短(采样法) */
    {
      const hx=player.position.x,hy=1.6,hz=player.position.z;
      let cut=1;
      outer:for(let s=.28;s<=1;s+=.08){
        const x=hx+(want.x-hx)*s,y=hy+(want.y-hy)*s,z=hz+(want.z-hz)*s;
        for(const b of CAM_BLOCKERS){
          if(y<b.h&&Math.hypot(x-b.x,z-b.z)<b.r){cut=Math.max(.24,s-.1);break outer;}
        }
      }
      if(cut<1){
        want.set(hx+(want.x-hx)*cut,Math.max(hy+1.4,hy+(want.y-hy)*cut),hz+(want.z-hz)*cut);
      }
    }
  }
  camPos.lerp(want,.09);
  cam.position.copy(camPos);
  cam.lookAt(look);
  for(const b of bubbles){b.position.y+=b.userData.v*dt;
    if(b.position.y>26){b.position.y=2;b.position.x=(Math.random()-.5)*80;}}
  for(const c of clouds){c.position.x+=c.userData.sp*dt;
    if(c.position.x>95)c.position.x=-95;}
  for(const g of swayers)g.rotation.z=Math.sin(tS*.9+g.userData.ph)*.06;
  if(goldRing){const p=1+Math.sin(tS*2.4)*.05;goldRing.scale.set(p,p,1);}
  statue.rotation.y=Math.sin(now*.0001)*.05;
  const heroMoving=(typeof keyMove!=='undefined'&&keyMove)||moving;
  if(heroEntry&&heroEntry.act)setLoco(heroEntry,heroMoving?'walk':'idle');
  if(ROMP.on&&!ROMP.done){
    for(const m of ROMP.list){
      if(!m.userData.alive)continue;
      m.position.y=1.6+Math.sin(tS*1.5+m.userData.ph)*.28;
      m.rotation.y+=dt*.5;
      if(Math.hypot(player.position.x-m.position.x,player.position.z-m.position.z)<1.6)rompPop(m);
    }
  }
  for(const ab of animBunnies){
    if(ab.mixer){ab.mixer.update(dt);continue;}
    ab.inner.scale.y=1+Math.sin(tS*1.8+ab.ph)*.013;
    ab.inner.rotation.z=Math.sin(tS*.6+ab.ph)*.018;
    if(FMAT.ready&&ab.eyes){
      if(now>ab.nextBlink){ab.blinkEnd=now+150;ab.nextBlink=now+2400+Math.random()*3000;}
      let mat=FMAT.eyes_open;
      if(ab===animBunnies[0]&&playerFace.mode&&now<playerFace.until)
        mat=FMAT['eyes_'+playerFace.mode]||FMAT.eyes_open;
      if(now<ab.blinkEnd)mat=FMAT.eyes_closed;
      if(ab.eyes.material!==mat)ab.eyes.material=mat;
    }
  }
  miniT+=dt;if(miniT>.15){miniT=0;updMini();}
  if(!playMode&&!(ROMP.on&&ROMP.done)){
    let key=null,html=null;
    for(let i=0;i<STATIONS.length;i++){
      const st=STATIONS[i];
      if(Math.hypot(player.position.x-st.x,player.position.z-st.z)<6.5){key="st"+i;html=stationPanel(i);break;}
    }
    if(!key&&Math.hypot(player.position.x,player.position.z+16)<10){key="dojo";html=dojoPanel();}
    showZoneHtml(key,html);
    /* 传送门:金环旋转 + 走近瞬移(带冷却);悬浮岛呼吸 */
    for(const f of FLOAT_DECOS)f.g.position.y=f.y0+Math.sin(tS*.8+f.ph)*.5;
    const nowP=performance.now();
    for(const p of PORTALS){
      p.ring.rotation.y+=dt*.7;
      p.glow.material.opacity=.32+Math.sin(tS*2+p.x)*.1;
      if(nowP<tpCool)continue;
      if(Math.hypot(player.position.x-p.x,player.position.z-p.z)<2.4){
        tpCool=nowP+2600;
        if(!p.open()){
          say3(p.tip+"，金环才会为你打开！");
          const dx=player.position.x-p.x,dz=player.position.z-p.z,dd=Math.hypot(dx,dz)||1;
          player.position.x=p.x+dx/dd*4;player.position.z=p.z+dz/dd*4;moving=false;
          window.__face&&__face('surprised',800);
        }else{
          player.position.set(p.dest[0],0,p.dest[1]);
          target.copy(player.position);moving=false;
          say3(p.line);window.__face&&__face('happy',1200);
        }
      }
    }
  }
  renderer.render(scene,cam);
}
function tick(now){step(now);requestAnimationFrame(tick);}
requestAnimationFrame(tick);
setInterval(()=>{const n=performance.now();if(n-t0>200)step(n);},100);
addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

const mapXY=(x,z)=>[50+x*(46/50),((z+70)/92)*84+8];
/* 小地图快速旅行:点已解锁的车站点,兔兔嗖一下过去 */
function miniTravel(i){
  const st=STATIONS[i];
  if(!st.open()){say3("这里是第"+(i+1)+"关·"+st.name+"。还早一点哦——"+st.tip+"，学会了再来找我！");return;}
  player.position.set(st.x,0,st.z+7);target.copy(player.position);moving=false;
  camYaw=0;curZone=null;
  window.__face&&__face('happy',1000);
  say3("嗖——到站啦！");
}
function buildMini(){
  const m=$('mini');m.innerHTML='<span id="mrab"></span>';
  let nextName=null;
  STATIONS.forEach((st,i)=>{
    const d=document.createElement('span');d.className='mdot lock';
    const s=stat(i);
    if(st.open()){
      if(s.done>=s.tot)d.className='mdot done';
      else if(!nextName){d.className='mdot next';nextName=ttStop(i+1)+"·"+tt(st.name);}
    }
    const[mx,my]=mapXY(st.x,st.z);
    d.style.left=Math.max(4,Math.min(96,mx))+'%';d.style.top=Math.max(4,Math.min(96,my))+'%';
    d.title="第"+(i+1)+"关 · "+st.name;
    d.onclick=ev=>{ev.stopPropagation();miniTravel(i);};
    m.appendChild(d);
  });
  const bd=document.createElement('span');bd.className='mdot done';bd.style.background='#C89A5B';
  const[bx,by]=mapXY(0,-16);bd.style.left=bx+'%';bd.style.top=by+'%';m.appendChild(bd);
  {const _l=QLANG();
  $('mnext').textContent=nextName?((_l==='zh'?'下一站 · ':_l==='en'?'Next · ':'Weiter · ')+nextName)
    :(_l==='zh'?'全部通关！去见兔祖师🐰':_l==='en'?'All cleared! Visit Master Rabbit 🐰':'Alles geschafft! Besuch den Hasenmeister 🐰');}
}
buildMini();
$('mini').onclick=()=>{resetHome();say3("回到出发点啦！");};
window.__applyLang=function(){
  try{
    const coarse=matchMedia&&matchMedia('(pointer:coarse)').matches;
    $('hint').textContent=tt(coarse?"点哪走哪 · 拖动看风景 · 双指缩放":"↑↓←→ 走路 · 拖动看风景 · 滚轮放大缩小");
    $('back').textContent=tt("📖 课程");
    refreshStations();buildDojoLabel();buildMini();
    PORTALS.forEach(p=>{if(p.label)scene.remove(p.label);
      p.label=textSprite([tt(p.name),tt("金环传送门")],false);
      p.label.position.set(p.x,6.2,p.z);scene.add(p.label);});
    window.__qzApplyLang&&__qzApplyLang(); /* 同步 2D 课堂文字 */
  }catch(e){}
};
__applyLang();
function updMini(){
  const r=$('mrab');if(!r)return;
  const[mx,my]=mapXY(player.position.x,player.position.z);
  r.style.left=Math.max(4,Math.min(96,mx))+'%';r.style.top=Math.max(4,Math.min(96,my))+'%';
}

let greeted=false;
addEventListener('pointerdown',()=>{
  if(greeted)return;greeted=true;
  const st=STATIONS[currentIdx];
  say3("欢迎来到棋境！去找戴金圈的小屋，小兔子老师在等你！");
});

window.__faceTune=o=>{Object.assign(FACE,o);
  animBunnies.forEach(a=>{if(!a.eyes)return;const H=a.H;
    a.eyes.position.set(0,FACE.eyeY*H,FACE.eyeZ*H);
    a.eyes.geometry.dispose();a.eyes.geometry=new THREE.PlaneGeometry(FACE.eyeW*H,FACE.eyeH*H);
    if(a.base){a.base.position.set(0,FACE.eyeY*H,(FACE.eyeZ-.012)*H);
      a.base.geometry.dispose();a.base.geometry=new THREE.PlaneGeometry(FACE.eyeW*1.3*H,FACE.eyeH*1.9*H);}
    a.blush.position.set(0,FACE.bY*H,FACE.bZ*H);
    a.blush.geometry.dispose();a.blush.geometry=new THREE.PlaneGeometry(FACE.bW*H,FACE.bH*H);
  });return FACE;};
window.__faceDbg=()=>{const a=animBunnies[0]||{};return{ready:FMAT.ready,
  loaded:Object.keys(FMAT).filter(k=>k!=='ready'),
  hasEyes:!!a.eyes,eyesVisible:a.eyes&&a.eyes.visible,
  matNow:a.eyes?(a.eyes.material===FMAT.eyes_closed?'closed':a.eyes.material===FMAT.eyes_open?'open':'other'):null,
  blinkEnd:a.blinkEnd,t0Now:t0,inWindow:a.blinkEnd>t0};};
window.__setInnerRot=v=>{animBunnies.forEach(a=>{if(a.inner)a.inner.rotation.y=v;});};
window.__anim=()=>animBunnies.map((a,i)=>{
  const me=a.wrap.matrixWorld.elements;
  const ee=a.eyes?a.eyes.matrixWorld.elements:null;
  return{i,H:a.H,wrapPos:[me[12],me[13],me[14]].map(v=>+v.toFixed(2)),
    wrapZ:[me[8],me[10]].map(v=>+v.toFixed(2)),
    eyesPos:ee?[ee[12],ee[13],ee[14]].map(v=>+v.toFixed(2)):null,
    eyesZ:ee?[ee[8],ee[10]].map(v=>+v.toFixed(2)):null};
});
window.__w3_setyaw=v=>{camYaw=v;};
window.__say3=say3; // QA:语音匹配探针用
window.__w3={pos:()=>player.position.toArray(),go:(x,z)=>{target.set(x,0,z);moving=true;},
  tp:(x,z)=>{player.position.set(x,0,z);target.set(x,0,z);moving=false;
    camPos.set(x+Math.sin(camYaw)*camDist,2.4+camDist*.3,z+Math.cos(camYaw)*camDist);step(performance.now()+1);},
  zone:()=>curZone,zoom:v=>{camDist=Math.min(15,Math.max(5.5,v));},
  blink:()=>{const n=Math.max(performance.now(),t0);animBunnies.forEach(a=>{a.blinkEnd=n+60000;a.nextBlink=n+9e9;});step(t0+16);},
  startPlay:()=>window.__startPlay(),exitPlay:()=>window.__exitPlay(),
  clickGrid:(i,j)=>pClickGrid(i,j),stepNow:(ms)=>step(t0+(ms||16)),
  bunnies:()=>animBunnies.length,home:()=>resetHome(),
  pstate:()=>({playMode,pOver,pBusy,board:pg?pg.map(r=>r.join("")).join("|"):null,panel:zoneEl.textContent.replace(/\s+/g,' ').slice(0,80)})};
